<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>온톨로지 맵 서비스</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (JSX 컴파일러) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons (Vanilla JS) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* SVG 아이콘이 부모 Wrapper(Span) 크기에 맞게 조절되도록 강제 설정 */
    .lucide { width: 100%; height: 100%; stroke: currentColor; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Lucide 아이콘 React Wrapper (HTML 단일 파일용) ---
    const IconWrapper = ({ name, size = 24, className = "" }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current) {
          ref.current.innerHTML = `<i data-lucide="${name}"></i>`;
          lucide.createIcons({ root: ref.current });
        }
      }, [name]);
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size, color: 'inherit' }}></span>;
    };

    // 사용된 모든 아이콘 매핑
    const Network = (p) => <IconWrapper name="network" {...p} />;
    const LayoutDashboard = (p) => <IconWrapper name="layout-dashboard" {...p} />;
    const Settings = (p) => <IconWrapper name="settings" {...p} />;
    const LogOut = (p) => <IconWrapper name="log-out" {...p} />;
    const Search = (p) => <IconWrapper name="search" {...p} />;
    const Plus = (p) => <IconWrapper name="plus" {...p} />;
    const AlertCircle = (p) => <IconWrapper name="alert-circle" {...p} />;
    const FileText = (p) => <IconWrapper name="file-text" {...p} />;
    const Download = (p) => <IconWrapper name="download" {...p} />;
    const CheckCircle = (p) => <IconWrapper name="check-circle" {...p} />;
    const ShieldAlert = (p) => <IconWrapper name="shield-alert" {...p} />;
    const Lock = (p) => <IconWrapper name="lock" {...p} />;
    const User = (p) => <IconWrapper name="user" {...p} />;
    const Users = (p) => <IconWrapper name="users" {...p} />;
    const X = (p) => <IconWrapper name="x" {...p} />;
    const Save = (p) => <IconWrapper name="save" {...p} />;
    const Briefcase = (p) => <IconWrapper name="briefcase" {...p} />;
    const Database = (p) => <IconWrapper name="database" {...p} />;
    const LinkIcon = (p) => <IconWrapper name="link" {...p} />;
    const Trash2 = (p) => <IconWrapper name="trash-2" {...p} />;
    const Edit3 = (p) => <IconWrapper name="edit-3" {...p} />;
    const Type = (p) => <IconWrapper name="type" {...p} />;
    const Undo2 = (p) => <IconWrapper name="undo-2" {...p} />;
    const Redo2 = (p) => <IconWrapper name="redo-2" {...p} />;
    const Zap = (p) => <IconWrapper name="zap" {...p} />;
    const BrainCircuit = (p) => <IconWrapper name="brain-circuit" {...p} />;
    const KeySquare = (p) => <IconWrapper name="key-square" {...p} />;
    const Activity = (p) => <IconWrapper name="activity" {...p} />;
    const ChevronRight = (p) => <IconWrapper name="chevron-right" {...p} />;
    const ChevronLeft = (p) => <IconWrapper name="chevron-left" {...p} />;
    const Monitor = (p) => <IconWrapper name="monitor" {...p} />;
    const BookOpen = (p) => <IconWrapper name="book-open" {...p} />;
    const Scale = (p) => <IconWrapper name="scale" {...p} />;
    const ClipboardCheck = (p) => <IconWrapper name="clipboard-check" {...p} />;
    const ShieldCheck = (p) => <IconWrapper name="shield-check" {...p} />;
    const ArrowLeftRight = (p) => <IconWrapper name="arrow-left-right" {...p} />;
    const ExternalLink = (p) => <IconWrapper name="external-link" {...p} />;
    const Paperclip = (p) => <IconWrapper name="paperclip" {...p} />;
    const PlusCircle = (p) => <IconWrapper name="plus-circle" {...p} />;

    // --- [Default Meta Attributes based on Schema] ---
    const defaultMeta = {
      Task: { 상태: '미진행', 목적: '', 담당자: '', 시작일: '', 종료일: '' },
      Data: { 상태: '미진행', 담당자: '', 데이터셋명: '', 데이터형태: '', 갱신주기: '', 접근권한: '' }, 
      System: { 상태: '미진행', 담당자: '', 시스템명: '', URL: '', 운영부서: '', 데이터셋명: '', 데이터형태: '', 접근권한: '' }, 
      Law: { 상태: '미진행', 담당자: '', 국가법령명: '', 시행일: '', 소관부처: '', 조항: '', 원문링크: '' },
      Regulation: { 상태: '미진행', 담당자: '', 사내규정명: '', 시행일: '', 주관부서: '', 조항: '', 원문링크: '' },
      Guideline: { 상태: '미진행', 담당자: '', 매뉴얼명: '', 버전: '', 작성자: '', 원문파일: '' },
      Deliverable: { 상태: '미진행', 담당자: '', 산출물명: '', 확장자: '', 생성일: '', 승인자: '' }
    };

    const typeColors = {
      Task: '#2563eb',       
      Data: '#0ea5e9',       
      System: '#6366f1',     
      Law: '#1e3a8a',        
      Regulation: '#0284c7', 
      Guideline: '#38bdf8',  
      Deliverable: '#93c5fd' 
    };

    const typeLabels = {
      Task: '과제', Data: '데이터', System: '시스템', 
      Law: '국가법령', Regulation: '사내규정', Guideline: '지침', Deliverable: '산출물'
    };

    const methodNames = {
      manual: '수동 연결 (No Rule)',
      semantic: '시맨틱 추론 (AI)',
      keyword: '키워드 매칭',
      cooccurrence: '문서 동시 출현',
      rule: '사전 룰 엔진 매핑',
      inheritance: '상위 속성 상속',
      transitive: '네트워크 연쇄 추론',
      log: '시스템 로그 분석'
    };

    const methodDescriptions = {
      manual: '규칙 없이 사용자가 직접 연결하는 방식입니다.',
      semantic: 'AI가 양측 객체 문서의 문맥과 의미를 분석하여 연결하는 방식입니다.',
      keyword: '양측 객체 속성에서 공통 키워드가 발견될 때 연결하는 방식입니다.',
      cooccurrence: '문서 내에서 두 객체가 함께 언급되는 빈도를 기반으로 연결합니다.',
      rule: '명문화된 IF-THEN 로직에 의해 시스템이 강제로 매핑하는 방식입니다.',
      inheritance: '상위 객체가 가진 관계나 속성을 하위 객체가 물려받아 연결됩니다.',
      transitive: 'A-B, B-C의 관계를 통해 A-C의 간접 관계를 논리적으로 도출합니다.',
      log: '구성원들의 시스템 사용 로그를 기반으로 실질적 연관성을 도출합니다.'
    };

    const logicPlaceholders = {
      semantic: '예) 벡터 유사도 > 0.85 이상 시 자동 연결',
      keyword: '예) [적용대상직무] 필드와 [관련직무] 필드 텍스트 100% 일치',
      cooccurrence: '예) 공지사항 문서에서 동시 출현 빈도 5회 이상',
      rule: '예) IF (과제.상태 == "진행중") THEN (자동 매핑)',
      inheritance: '예) 상위 과제가 준수하는 법령을 산출물도 자동 상속',
      transitive: '예) A-B 연결 AND B-C 연결 => A-C 논리적 도출',
      log: '예) 최근 30일 내 API 트래픽이 100건 이상인 경우 도출'
    };

    const methodIcons = {
      manual: <Edit3 size={16} className="text-slate-600 mr-2" />,
      semantic: <BrainCircuit size={16} className="text-purple-600 mr-2" />,
      keyword: <KeySquare size={16} className="text-blue-600 mr-2" />,
      cooccurrence: <FileText size={16} className="text-indigo-600 mr-2" />,
      rule: <Zap size={16} className="text-emerald-600 mr-2" />,
      inheritance: <Network size={16} className="text-orange-600 mr-2" />,
      transitive: <LinkIcon size={16} className="text-teal-600 mr-2" />,
      log: <Activity size={16} className="text-cyan-600 mr-2" />
    };

    const dataTypeGuides = {
      '관계형DB (RDB)': '정형화된 테이블 구조의 데이터베이스 (예: MySQL, Oracle)',
      'NoSQL': '유연한 스키마를 가진 비정형 데이터베이스 (예: MongoDB)',
      '엑셀/CSV': '스프레드시트 형태의 파일형 데이터',
      'JSON/XML': '웹 API 통신 등에 사용되는 텍스트 기반 구조화 포맷',
      'REST API': '외부 시스템에서 실시간으로 호출해오는 데이터 인터페이스',
      '문서 (PDF/Word)': '텍스트 위주의 비정형 산출물 문서'
    };

    const defaultMockUsers = [
      { id: 'admin', pw: 'admin', name: '최고 관리자', role: 'System Admin', dept: '인사/조직문화팀', needPwChange: false },
      { id: 'user1', pw: 'user1', name: '김HR', role: 'Editor', dept: 'HRD팀', needPwChange: false },
      { id: 'user2', pw: 'user2', name: '이IT', role: 'Editor', dept: 'IT지원팀', needPwChange: false }
    ];

    // --- [Components] ---
    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 3000);
        return () => clearTimeout(timer);
      }, [onClose]);
      const bgColor = type === 'error' ? 'bg-red-500' : 'bg-green-500';
      return (
        <div className={`fixed bottom-4 right-4 text-white px-4 py-3 rounded shadow-lg flex items-center space-x-2 animate-bounce ${bgColor} z-50`}>
          {type === 'error' ? <ShieldAlert size={20} /> : <CheckCircle size={20} />}
          <span>{message}</span>
        </div>
      );
    };

    const DataFormatInput = ({ val, nodeId, updateNodeMeta }) => {
      const isCustom = val && !Object.keys(dataTypeGuides).includes(val);
      const [mode, setMode] = useState(isCustom ? 'custom' : 'select');

      const handleSelect = (e) => {
        if (e.target.value === 'custom') {
          setMode('custom');
          updateNodeMeta(nodeId, '데이터형태', '');
        } else {
          setMode('select');
          updateNodeMeta(nodeId, '데이터형태', e.target.value);
        }
      };

      return (
        <div className="space-y-1.5">
          <select 
            className="w-full text-sm border border-slate-300 bg-white px-3 py-2 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 font-bold text-slate-700 cursor-pointer transition" 
            value={mode === 'custom' ? 'custom' : val} 
            onChange={handleSelect}
          >
            <option value="">형태 선택...</option>
            {Object.keys(dataTypeGuides).map(opt => <option key={opt} value={opt}>{opt}</option>)}
            <option value="custom">직접 입력 (목록에 없음)</option>
          </select>
          
          {mode === 'custom' && (
             <input 
               type="text" 
               className="w-full text-sm border border-slate-300 bg-white px-3 py-2 rounded-lg outline-none focus:border-blue-500 font-medium mt-1" 
               value={val} onChange={(e) => updateNodeMeta(nodeId, '데이터형태', e.target.value)} 
               placeholder="원하는 데이터 형태를 직접 입력하세요" 
             />
          )}
          
          {mode === 'select' && val && dataTypeGuides[val] && (
            <p className="text-[10px] text-slate-500 font-medium bg-slate-100 p-1.5 rounded">💡 {dataTypeGuides[val]}</p>
          )}
        </div>
      );
    };

    function TaskOntologyApp() {
      const [usersDb, setUsersDb] = useState(() => {
        const saved = localStorage.getItem('ontologyUsersDB');
        return saved ? JSON.parse(saved) : defaultMockUsers;
      });
      
      const [currentUser, setCurrentUser] = useState(null);
      const [currentView, setCurrentView] = useState('login'); 
      const [toast, setToast] = useState(null);
      const [isAnytimePwModalOpen, setIsAnytimePwModalOpen] = useState(false);

      const showToast = (msg, type = 'success') => setToast({ message: msg, type });

      const saveUsersToDb = (newUsers) => {
        setUsersDb(newUsers);
        localStorage.setItem('ontologyUsersDB', JSON.stringify(newUsers));
      };

      const handleLogin = (id, pw) => {
        const user = usersDb.find(u => u.id === id);
        if (user && user.pw === pw) {
          setCurrentUser(user);
          if (user.needPwChange) {
            setCurrentView('pwChange');
          } else {
            setCurrentView('dashboard');
          }
          showToast(`${user.name}님 환영합니다!`);
        } else {
          showToast('ID(사번) 또는 비밀번호가 일치하지 않습니다.', 'error');
        }
      };

      const handlePasswordChangeSubmit = (newPw) => {
        const updatedUsers = usersDb.map(u => u.id === currentUser.id ? { ...u, pw: newPw, needPwChange: false } : u);
        saveUsersToDb(updatedUsers);
        setCurrentUser({ ...currentUser, pw: newPw, needPwChange: false });
        setCurrentView('dashboard');
        showToast('비밀번호가 성공적으로 변경되었습니다.');
        setIsAnytimePwModalOpen(false);
      };

      const handleAddUser = (newUser) => {
        if (usersDb.find(u => u.id === newUser.id)) {
          showToast('이미 존재하는 ID(사번)입니다.', 'error');
          return false;
        }
        saveUsersToDb([...usersDb, newUser]);
        showToast('신규 계정이 추가되었습니다.');
        return true;
      };

      const handleUpdateUser = (updatedUser, originalId = updatedUser.id) => {
        if (originalId !== updatedUser.id && usersDb.find(u => u.id === updatedUser.id)) {
          showToast('이미 존재하는 ID(사번)입니다.', 'error');
          return false;
        }
        const updatedList = usersDb.map(u => u.id === originalId ? updatedUser : u);
        saveUsersToDb(updatedList);
        if (currentUser.id === originalId) setCurrentUser(updatedUser);
        showToast('계정 정보가 성공적으로 반영되었습니다.');
        return true;
      };

      const handleDeleteUser = (userId) => {
        if (userId === 'admin') {
          showToast('최고 관리자 계정은 삭제할 수 없습니다.', 'error');
          return;
        }
        saveUsersToDb(usersDb.filter(u => u.id !== userId));
        showToast('계정이 삭제되었습니다.');
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setCurrentView('login');
        showToast('로그아웃 되었습니다.');
      };

      if (currentView === 'login') return <LoginView onLogin={handleLogin} />;
      if (currentView === 'pwChange') return <PasswordChangeView onSubmit={handlePasswordChangeSubmit} />;

      return (
        <div className="flex h-screen bg-slate-50 font-sans text-slate-800 selection:bg-blue-200">
          <aside className="w-64 bg-slate-900 text-slate-300 flex flex-col transition-all duration-300 shrink-0 shadow-2xl z-30">
            <div className="h-16 flex items-center px-6 font-bold text-white text-lg tracking-wide border-b border-slate-800 bg-slate-950">
              <Network className="mr-2 text-blue-500" size={24} />
              Ontology Map
            </div>
            <nav className="flex-1 py-6 space-y-1 px-3">
              <NavItem icon={<LayoutDashboard />} label="대시보드" active={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
              <NavItem icon={<Network />} label="온톨로지 맵 뷰어" active={currentView === 'map'} onClick={() => setCurrentView('map')} />
              {currentUser?.role === 'System Admin' && (
                <NavItem icon={<Users />} label="계정/권한 관리" active={currentView === 'admin'} onClick={() => setCurrentView('admin')} />
              )}
            </nav>
            <div className="p-4 border-t border-slate-800 bg-slate-950 flex flex-col space-y-3">
              <div className="flex items-center justify-between">
                <div className="flex items-center space-x-3">
                  <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold shadow-inner">
                    {currentUser?.name.charAt(0)}
                  </div>
                  <div className="text-sm">
                    <p className="text-white font-bold">{currentUser?.name}</p>
                    <p className="text-[10px] text-blue-300">{currentUser?.role}</p>
                  </div>
                </div>
              </div>
              <div className="flex items-center space-x-2 pt-2 border-t border-slate-800">
                <button onClick={() => setIsAnytimePwModalOpen(true)} className="flex-1 flex items-center justify-center px-2 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded text-xs font-bold transition">
                  <Settings size={14} className="mr-1.5" /> 비밀번호
                </button>
                <button onClick={handleLogout} className="flex-1 flex items-center justify-center px-2 py-1.5 bg-red-900/30 hover:bg-red-800/50 text-red-300 rounded text-xs font-bold transition">
                  <LogOut size={14} className="mr-1.5" /> 로그아웃
                </button>
              </div>
            </div>
          </aside>

          <main className="flex-1 flex flex-col overflow-hidden relative min-w-0">
            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-10 shrink-0">
              <h1 className="text-lg font-extrabold text-slate-800">
                {currentView === 'dashboard' && '과제 및 품질 대시보드'}
                {currentView === 'map' && '온톨로지 맵 탐색기'}
                {currentView === 'admin' && '시스템 관리자 전용 대시보드'}
              </h1>
            </header>

            <MapAndDashboardContainer 
              currentView={currentView} 
              setCurrentView={setCurrentView} 
              showToast={showToast} 
              currentUser={currentUser} 
              usersDb={usersDb} 
              onAddUser={handleAddUser}
              onUpdateUser={handleUpdateUser}
              onDeleteUser={handleDeleteUser}
            />
          </main>
          
          {isAnytimePwModalOpen && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50">
               <PasswordChangeForm onClose={() => setIsAnytimePwModalOpen(false)} onSubmit={handlePasswordChangeSubmit} currentPwReq={true} userPw={currentUser.pw} />
            </div>
          )}

          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    const NavItem = ({ icon, label, active, onClick }) => (
      <button 
        onClick={onClick}
        className={`w-full flex items-center px-4 py-2.5 text-sm font-semibold rounded-lg transition-all ${
          active ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-100'
        }`}
      >
        <span className="mr-3">{icon}</span>
        {label}
      </button>
    );

    const LoginView = ({ onLogin }) => {
      const [id, setId] = useState('');
      const [pw, setPw] = useState('');
      return (
        <div className="min-h-screen flex items-center justify-center bg-slate-100">
          <div className="bg-white p-10 rounded-2xl shadow-2xl w-[400px]">
            <div className="flex justify-center mb-6">
              <div className="bg-blue-600 p-4 rounded-2xl text-white shadow-lg"><Network size={40} /></div>
            </div>
            <h2 className="text-2xl font-extrabold text-center text-slate-800 mb-2">온톨로지 맵 시스템</h2>
            <p className="text-center text-sm text-slate-500 mb-8 font-medium">관리자가 발급한 사번과 비밀번호로 로그인하세요.</p>
            <div className="space-y-5">
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-1.5">ID (사번)</label>
                <input 
                  type="text" value={id} onChange={e => setId(e.target.value)} 
                  className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition font-medium" 
                  placeholder="사번을 입력하세요" 
                />
              </div>
              <div>

    const PasswordChangeForm = ({ onClose, onSubmit, currentPwReq, userPw }) => {
      const [currentPw, setCurrentPw] = useState('');
      const [newPw, setNewPw] = useState('');
      const [confirmPw, setConfirmPw] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = () => {
        if (currentPwReq && currentPw !== userPw) {
          setError('현재 비밀번호가 일치하지 않습니다.'); return;
        }
        if (newPw.length < 4) {
          setError('새 비밀번호는 4자리 이상이어야 합니다.'); return;

          setError('새 비밀번호와 확인이 일치하지 않습니다.'); return;

          <div className="flex items-center space-x-2 mb-6">

    const MapAndDashboardContainer = ({ currentView, setCurrentView, showToast, currentUser, usersDb, onAddUser, onUpdateUser, onDeleteUser }) => {
      const [nodes, setNodes] = useState(() => {
        const saved = localStorage.getItem('ontologyMapDB');
        return saved ? JSON.parse(saved).nodes || [] : [];
      });
      const [edges, setEdges] = useState(() => {
        const saved = localStorage.getItem('ontologyMapDB');
        return saved ? JSON.parse(saved).edges || [] : [];
      });

      useEffect(() => {
        try {
          localStorage.setItem('ontologyMapDB', JSON.stringify({ nodes, edges }));
        } catch (error) {
          console.error("Auto-save failed", error);
        }
      }, [nodes, edges]);

      const handleSaveMap = () => {
        try {
          localStorage.setItem('ontologyMapDB', JSON.stringify({ nodes, edges }));
          showToast('맵 구조가 안전하게 저장되었습니다.', 'success');
        } catch(e) {
          showToast('저장 공간(용량) 부족으로 실패했습니다.', 'error');

        <div className="flex-1 overflow-auto p-4 md:p-6 bg-slate-50/50 relative">
          {currentView === 'dashboard' && <DashboardView onNavMap={() => setCurrentView('map')} nodes={nodes} edges={edges} currentUser={currentUser} />}
          {currentView === 'map' && <MapView nodes={nodes} setNodes={setNodes} edges={edges} setEdges={setEdges} handleSaveMap={handleSaveMap} showToast={showToast} users={usersDb} />}

        </div>
      );
    };

    const DashboardView = ({ onNavMap, nodes, edges, currentUser }) => {
      const myNodes = nodes.filter(n => n.meta?.담당자?.includes(currentUser.name) || n.meta?.접근권한?.includes(currentUser.name));
      const myEdgesCount = edges.filter(e => myNodes.some(n => n.id === e.source || n.id === e.target)).length;

      const connectedNodes = nodes.filter(n => edges.some(e => e.source === n.id || e.target === n.id));
      const connectedTaskCount = connectedNodes.filter(n => n.type === 'Task').length;
      const connectedDataCount = connectedNodes.filter(n => n.type === 'Data').length;
      const connectedSystemCount = connectedNodes.filter(n => n.type === 'System').length;
      const connectedDocCount = connectedNodes.filter(n => ['Law', 'Regulation', 'Guideline', 'Deliverable'].includes(n.type)).length;

      return (
        <div className="space-y-6 max-w-6xl mx-auto">
          <h2 className="text-lg font-bold text-slate-800">나의 담당 현황</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-2xl shadow-lg flex flex-col justify-between text-white relative overflow-hidden">
              <div className="absolute -right-4 -top-4 opacity-20"><Briefcase size={120} /></div>
              <p className="text-sm font-semibold opacity-90 relative z-10">내가 담당하는 객체 (과제 등)</p>
              <div className="text-4xl font-extrabold mt-2 relative z-10">{myNodes.length}<span className="text-base font-medium opacity-80 ml-1">개</span></div>
            </div>
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between relative overflow-hidden">
              <div className="absolute -right-4 -top-4 opacity-5 text-indigo-500"><Network size={120} /></div>
              <p className="text-sm font-bold text-slate-500 relative z-10">나의 객체와 연결된 관계망 수</p>
              <div className="text-4xl font-extrabold text-indigo-600 mt-2 relative z-10">{myEdgesCount}<span className="text-base font-medium text-slate-400 ml-1">건 연결됨</span></div>
            </div>
          </div>

          <h2 className="text-lg font-bold text-slate-800 mt-8">전체 객체 연결 현황 (온톨로지 맵)</h2>
          <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
              <p className="text-sm text-slate-500 font-bold">전체 연결된 객체</p>
              <div className="text-3xl font-extrabold text-blue-600 mt-2">{connectedNodes.length}<span className="text-sm font-medium text-slate-400 ml-1">개</span></div>
            </div>
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
              <p className="text-sm text-slate-500 font-bold">연결된 과제 (Task)</p>
              <div className="text-3xl font-extrabold text-slate-800 mt-2">{connectedTaskCount}<span className="text-sm font-medium text-slate-400 ml-1">개</span></div>
            </div>
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
              <p className="text-sm text-slate-500 font-bold">연결된 데이터 (Data)</p>
              <div className="text-3xl font-extrabold text-slate-800 mt-2">{connectedDataCount}<span className="text-sm font-medium text-slate-400 ml-1">개</span></div>
            </div>
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
              <p className="text-sm text-slate-500 font-bold">연결된 문서/시스템</p>
              <div className="text-3xl font-extrabold text-slate-800 mt-2">{connectedSystemCount + connectedDocCount}<span className="text-sm font-medium text-slate-400 ml-1">개</span></div>
            </div>
          </div>

          <h2 className="text-lg font-bold text-slate-800 mt-8">데이터 품질 모니터링</h2>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
              <p className="text-sm text-slate-500 font-bold">전체 등록 노드</p>
              <div className="text-3xl font-extrabold text-slate-800 mt-2">{nodes.length}<span className="text-sm font-medium text-slate-400 ml-1">개</span></div>
            </div>
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
              <p className="text-sm text-slate-500 font-bold">전체 연결 엣지</p>
              <div className="text-3xl font-extrabold text-slate-800 mt-2">{edges.length}<span className="text-sm font-medium text-slate-400 ml-1">개</span></div>
            </div>
            <div className="bg-red-50 p-6 rounded-2xl shadow-sm border border-red-100 flex flex-col justify-between">
              <p className="text-sm text-red-600 font-bold flex items-center"><AlertCircle size={16} className="mr-1"/> 고립된 객체 (연결 없음)</p>
              <div className="text-3xl font-extrabold text-red-600 mt-2">
                {nodes.filter(n => !edges.some(e => e.source === n.id || e.target === n.id)).length}
                <span className="text-sm font-medium text-red-400 ml-1">건 조치 필요</span>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const MapView = ({ nodes, setNodes, edges, setEdges, handleSaveMap, showToast, users }) => {
      const [past, setPast] = useState([]);
      const [future, setFuture] = useState([]);

      const [selectedId, setSelectedId] = useState(null); 
      const [selectionType, setSelectionType] = useState(null); 
      
      const [dragging, setDragging] = useState(null); 
      const [dragStartPos, setDragStartPos] = useState(null);

      const [connectMode, setConnectMode] = useState(false);
      const [connectSource, setConnectSource] = useState(null);
      
      const [isPanelOpen, setIsPanelOpen] = useState(false); 
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);

      const svgRef = useRef(null);
      const selectedNode = selectionType === 'node' ? nodes.find(n => n.id === selectedId) : null;
      const selectedEdge = selectionType === 'edge' ? edges.find(e => e.id === selectedId) : null;

      const saveState = (prevNodes = nodes, prevEdges = edges) => {
        setPast(prev => [...prev, { nodes: prevNodes, edges: prevEdges }]);
        setFuture([]);
      };

      const undo = () => {
        if (past.length === 0) return;
        const previous = past[past.length - 1];
        setFuture(prev => [{ nodes, edges }, ...prev]);
        setPast(prev => prev.slice(0, prev.length - 1));
        setNodes(previous.nodes);
        setEdges(previous.edges);
      };

      const redo = () => {
        if (future.length === 0) return;
        const next = future[0];
        setPast(prev => [...prev, { nodes, edges }]);
        setFuture(prev => prev.slice(1));
        setNodes(next.nodes);
        setEdges(next.edges);
      };

      const handleNodeMouseDown = (e, id) => {
        e.stopPropagation(); 
        if (connectMode) {
          if (!connectSource) {
            setConnectSource(id);
            showToast('대상 노드를 클릭하면 선이 연결됩니다.', 'success');
          } else {
            if (connectSource !== id) {
              saveState();
              const newEdge = { id: `e_${Date.now()}`, source: connectSource, target: id, label: '', method: 'manual', logic: '' };
              setEdges([...edges, newEdge]);
              showToast('성공적으로 연결되었습니다. 우측에서 규칙을 설정하세요.', 'success');
            }
            setConnectMode(false);
            setConnectSource(null);
          }
          return;
        }
        setDragging(id);
        setSelectedId(id);
        setSelectionType('node');
        if (!isPanelOpen) setIsPanelOpen(true);
        const node = nodes.find(n => n.id === id);
        if (node) setDragStartPos({ x: node.x, y: node.y });
      };

      const handleEdgeClick = (e, id) => {
        e.stopPropagation();
        if (connectMode) return;
        setSelectedId(id);
        setSelectionType('edge');
        if (!isPanelOpen) setIsPanelOpen(true);
      };

      const handleMouseMove = (e) => {
        if (!dragging || !svgRef.current) return;
        const CTM = svgRef.current.getScreenCTM();
        setNodes(prev => prev.map(n => {
          if (n.id === dragging) return { ...n, x: (e.clientX - CTM.e) / CTM.a, y: (e.clientY - CTM.f) / CTM.d };
          return n;
        }));
      };

      const handleMouseUp = () => {
        if (dragging && dragStartPos) {
          const node = nodes.find(n => n.id === dragging);
          if (node && (node.x !== dragStartPos.x || node.y !== dragStartPos.y)) {
            const prevNodes = nodes.map(n => n.id === dragging ? { ...n, x: dragStartPos.x, y: dragStartPos.y } : n);
            saveState(prevNodes, edges);
          }
        }
        setDragging(null);
        setDragStartPos(null);
      };

      const addNode = (type) => {
        saveState();
        const labels = { 
          'Task': '새로운 과제', 'Data': '새로운 데이터', 'System': '새로운 시스템',
          'Law': '새로운 국가법령', 'Regulation': '새로운 사내규정', 'Guideline': '새로운 지침', 'Deliverable': '새로운 산출물'
        };
        // 화면 중앙에 생성
        const mapContainer = document.getElementById('map-container');
        const cx = mapContainer ? mapContainer.clientWidth / 2 - 50 : 300;
        const cy = mapContainer ? mapContainer.clientHeight / 2 - 50 : 300;

        const newNode = {
          id: `n_${Date.now()}`,
          type,
          label: labels[type],
          x: cx + Math.random() * 50,
          y: cy + Math.random() * 50,
          color: typeColors[type],
          meta: { ...defaultMeta[type] }
        };
        setNodes([...nodes, newNode]);
        setSelectedId(newNode.id);
        setSelectionType('node');
        if (!isPanelOpen) setIsPanelOpen(true);
      };

      const deleteSelected = () => {
        saveState();
        if (selectionType === 'node') {
          setNodes(nodes.filter(n => n.id !== selectedId));
          setEdges(edges.filter(e => e.source !== selectedId && e.target !== selectedId));
        } else if (selectionType === 'edge') {
          setEdges(edges.filter(e => e.id !== selectedId));
        }
        setSelectedId(null);
        setSelectionType(null);
        setIsPanelOpen(false);
        showToast('삭제되었습니다.');
      };

      const updateNodeType = (id, newType) => {
        saveState();
        setNodes(nodes.map(n => {
          if (n.id === id) {
            const newMeta = { ...defaultMeta[newType] };
            Object.keys(n.meta).forEach(k => {
              if (k === '상태' || k === '첨부파일' || !Object.keys(defaultMeta[n.type]).includes(k)) {
                newMeta[k] = n.meta[k]; 
              }
            });
            return { ...n, type: newType, color: typeColors[newType], meta: newMeta };
          }
          return n;
        }));
      };

      const updateNode = (id, key, value) => {
        setNodes(nodes.map(n => n.id === id ? { ...n, [key]: value } : n));
      };

      const updateNodeMeta = (id, metaKey, value) => {
        setNodes(nodes.map(n => n.id === id ? { ...n, meta: { ...n.meta, [metaKey]: value } } : n));
      };

      const renameNodeMetaKey = (id, oldKey, newKey) => {
        if (!newKey || oldKey === newKey) return;
        setNodes(nodes.map(n => {
          if (n.id === id) {
            const newMeta = { ...n.meta };
            newMeta[newKey] = newMeta[oldKey];
            delete newMeta[oldKey];
            return { ...n, meta: newMeta };
          }
          return n;
        }));
      };

      const deleteNodeMetaKey = (id, key) => {
        setNodes(nodes.map(n => {
          if (n.id === id) {
            const newMeta = { ...n.meta };
            delete newMeta[key];
            return { ...n, meta: newMeta };
          }
          return n;
        }));
      };

      const updateEdge = (id, key, value) => {
        if (key === 'method') saveState(); 
        setEdges(edges.map(e => e.id === id ? { ...e, [key]: value } : e));
      };

      const reverseEdgeDirection = (edgeId) => {
        saveState();
        setEdges(edges.map(e => e.id === edgeId ? { ...e, source: e.target, target: e.source } : e));
        showToast('화살표 방향이 변경되었습니다.', 'success');
      };

      const addMemo = (nodeId) => {
        saveState();
        updateNodeMeta(nodeId, `메모_${Math.floor(Math.random() * 1000)}`, '');
      };

      const handleFileUpload = (e, nodeId) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 2 * 1024 * 1024) {
            showToast('파일 크기가 너무 큽니다. 프로토타입 환경에서는 2MB 이하의 파일만 허용됩니다.', 'error');
            return;
          }
          const reader = new FileReader();
          reader.onload = (event) => {
            const fileData = { name: file.name, url: event.target.result };
            updateNodeMeta(nodeId, '첨부파일', fileData);
            showToast(`[${file.name}] 파일이 안전하게 첨부 및 저장되었습니다.`);
          };
          reader.readAsDataURL(file);
        }
      };

      const getConnectedObjects = (nodeId) => {
        return edges.filter(e => e.source === nodeId || e.target === nodeId).map(edge => {
          const isSource = edge.source === nodeId;
          const connectedNodeId = isSource ? edge.target : edge.source;
          const connectedNode = nodes.find(n => n.id === connectedNodeId);
          return { edge, node: connectedNode, direction: isSource ? 'outgoing' : 'incoming' };
        }).filter(item => item.node); 
      };

      const renderMetaInput = (key, val, nodeId) => {
        const isUrl = val && typeof val === 'string' && (val.startsWith('http') || val.startsWith('www') || val.startsWith('link.'));

        if (['시작일', '종료일', '시행일', '생성일'].includes(key)) {
          return (
            <input 
              type="date" 
              className="w-full text-sm border border-slate-300 bg-white px-3 py-2 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 font-medium transition" 
              value={val || ''} onChange={(e) => updateNodeMeta(nodeId, key, e.target.value)} 
            />
          );
        }
        
        if (['담당자', '접근권한', '승인자'].includes(key)) {
          const currentUsers = val ? val.split(',').map(s=>s.trim()).filter(Boolean) : [];
          const toggleUser = (userName) => {
            if(currentUsers.includes(userName)) updateNodeMeta(nodeId, key, currentUsers.filter(u => u !== userName).join(', '));
            else updateNodeMeta(nodeId, key, [...currentUsers, userName].join(', '));
          };
          
          return (
            <div className="space-y-2">
              <select 
                className="w-full text-sm border border-slate-300 bg-white px-3 py-2 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 cursor-pointer font-bold text-slate-600 transition" 
                onChange={(e) => { if(e.target.value) toggleUser(e.target.value); e.target.value=''; }}
                defaultValue=""
              >
                <option value="">+ 계정 선택 (복수 가능)</option>
                {(users || []).map(u => <option key={u.id} value={u.name}>{u.name} ({u.dept})</option>)}
              </select>
              {currentUsers.length > 0 && (
                <div className="flex flex-wrap gap-1.5 mt-1">
                  {currentUsers.map(u => (
                    <span key={u} className="inline-flex items-center px-2 py-1 rounded bg-blue-100 text-blue-700 text-xs font-bold shadow-sm">
                      {u} <button onClick={() => toggleUser(u)} className="ml-1 hover:text-blue-900 bg-blue-200 rounded-full p-0.5"><X size={10}/></button>
                    </span>
                  ))}
                </div>
              )}
            </div>
          );
        }

        if (key === '데이터형태') {
          return (
            <DataFormatInput key={`df_${nodeId}`} val={val} nodeId={nodeId} updateNodeMeta={updateNodeMeta} />
          );
        }

        let placeholder = "값을 입력하세요";
        if (key === '목적') placeholder = "과제의 목적을 입력하세요.";
        if (key === '데이터셋명') placeholder = "데이터명을 입력하세요.";

        return (

                  <marker id="arrow-red" viewBox="0 0 10 10" refX="24" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

                </defs>

                <rect width="100%" height="100%" fill="url(#grid)" onClick={() => { if(!connectMode) { setSelectedId(null); setSelectionType(null); setIsPanelOpen(false); } }} />

                  const s = nodes.find(n => n.id === edge.source);
                  const t = nodes.find(n => n.id === edge.target);
                  if (!s || !t) return null;
                  const isSelected = selectedId === edge.id && selectionType === 'edge';
                  
                  const hasRule = edge.method !== 'manual' || (edge.logic && edge.logic.trim() !== '');
                  const edgeColor = hasRule ? '#10b981' : '#ef4444';
                  const strokeColor = isSelected ? '#3b82f6' : edgeColor;
                  const marker = isSelected ? 'arrow-blue-selected' : (hasRule ? 'arrow-green' : 'arrow-red');

                  return (

                      </text>
                    </g>
                  )

                                  title="파일 다운로드"

                                  <Download size={16}/>

                            <Paperclip size={24} className="mb-2 text-slate-400" />

                      </div>

                      <div className="pt-6 border-t border-slate-200 pb-10">
                        <h4 className="text-sm font-extrabold text-slate-800 mb-4 flex items-center">

                        {getConnectedObjects(selectedNode.id).length === 0 ? (

                          </div>

                      <select

                        <option value="keyword">🔑 키워드 매칭 (Keyword Match)</option>

                        <option disabled>────────── [ 논리/구조 도출 ] ──────────</option>

                          <span className="text-sm font-extrabold text-slate-800">{methodNames[selectedEdge.method]} 설명</span>
                        </div>
                        <p className="text-xs text-slate-600 leading-relaxed font-medium">
                          {methodDescriptions[selectedEdge.method]}
                        </p>
                      </div>

                      {selectedEdge.method !== 'manual' && (
                        <div className="mt-8">
                          <label className="text-sm font-extrabold text-slate-800 mb-3 flex items-center">
                            <Settings size={16} className="mr-1.5 text-blue-500" /> 
                            상세 규칙 및 세팅 로직 정의
                          </label>
                          <textarea
                            value={selectedEdge.logic || ''}
                            onChange={(e) => updateEdge(selectedEdge.id, 'logic', e.target.value)}
                            placeholder={logicPlaceholders[selectedEdge.method]}
                            className="w-full text-sm font-medium text-slate-800 border border-slate-300 rounded-xl p-4 focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none min-h-[140px] resize-y shadow-sm bg-white transition leading-relaxed"
                          />
                          <p className="text-[10px] text-slate-500 mt-2 font-medium leading-relaxed bg-blue-50 p-2 rounded-lg">
                            💡 이 규칙은 온톨로지 엔진이 노드를 자동으로 연결할 때 시스템 판단 기준(조건문, 임계치 등)으로 활용되며 규칙 존재 시 맵에서 선이 초록색으로 표시됩니다.
                          </p>
                        </div>
                      )}
                    </div>
                  </div>
                ) : (
                  <div className="flex-1 flex flex-col items-center justify-center text-slate-400 p-8 text-center space-y-4 bg-slate-50/50">
                    <div className="bg-white p-4 rounded-full shadow-sm border border-slate-100"><Type size={32} className="text-slate-300" /></div>
                    <p className="text-sm font-bold text-slate-500 leading-relaxed">맵에서 노드나 선을 클릭하면<br/>해당 객체의 속성을 편집할 수 있습니다.</p>
                  </div>
                )}
              </div>
            </div>
          </div>

          {isAddModalOpen && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50">
              <div className="bg-white rounded-2xl shadow-2xl w-[540px] overflow-hidden border border-slate-200">
                <div className="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                  <h3 className="font-extrabold text-lg text-slate-800">새로운 객체 추가</h3>
                  <button onClick={() => setIsAddModalOpen(false)} className="text-slate-400 hover:text-red-500 hover:bg-red-50 p-1.5 rounded-lg transition">
                    <X size={20} />
                  </button>
                </div>
                <div className="p-6">
                  
                  <h4 className="text-xs font-extrabold text-slate-400 mb-3 uppercase tracking-wide">프로젝트 / 과제</h4>
                  <div className="grid grid-cols-1 mb-6">
                     <button onClick={() => { addNode('Task'); setIsAddModalOpen(false); }} className="flex items-center p-4 border border-slate-200 rounded-xl hover:border-blue-500 hover:shadow-lg transition text-left bg-white group">
                        <div className="bg-blue-50 p-3 rounded-xl mr-4 group-hover:bg-blue-100 transition"><Briefcase size={20} className="text-blue-600"/></div>
                        <div><div className="text-sm font-extrabold text-slate-800 mb-0.5">과제 (Task)</div><div className="text-xs text-slate-500 font-medium">최상위 프로젝트, 단위 업무, AX 과제 등</div></div>
                     </button>
                  </div>

                  <h4 className="text-xs font-extrabold text-slate-400 mb-3 uppercase tracking-wide">구조형 객체 (데이터/시스템)</h4>
                  <div className="grid grid-cols-2 gap-4 mb-6">
                     <button onClick={() => { addNode('Data'); setIsAddModalOpen(false); }} className="flex flex-col items-center p-5 border border-slate-200 rounded-xl hover:border-sky-500 hover:shadow-lg transition text-center bg-white group">
                        <div className="bg-sky-50 p-3 rounded-xl mb-3 group-hover:bg-sky-100 transition"><Database size={24} className="text-sky-600"/></div>
                        <div className="text-sm font-extrabold text-slate-800 mb-1">데이터 (Data)</div>
                        <div className="text-[10px] text-slate-500 font-medium">DB, 테이블, 정형 데이터</div>
                     </button>
                     <button onClick={() => { addNode('System'); setIsAddModalOpen(false); }} className="flex flex-col items-center p-5 border border-slate-200 rounded-xl hover:border-indigo-500 hover:shadow-lg transition text-center bg-white group">
                        <div className="bg-indigo-50 p-3 rounded-xl mb-3 group-hover:bg-indigo-100 transition"><Monitor size={24} className="text-indigo-600"/></div>
                        <div className="text-sm font-extrabold text-slate-800 mb-1">시스템 (System)</div>
                        <div className="text-[10px] text-slate-500 font-medium">내부/외부 IT 인프라</div>
                     </button>
                  </div>

                  <h4 className="text-xs font-extrabold text-slate-400 mb-3 uppercase tracking-wide">문서형 객체 (가이드/규정)</h4>
                  <div className="grid grid-cols-2 gap-3">
                     <button onClick={() => { addNode('Law'); setIsAddModalOpen(false); }} className="flex items-center p-3 border border-slate-200 rounded-xl hover:border-red-500 hover:shadow-md transition text-left bg-white group">
                        <div className="bg-red-50 p-2.5 rounded-lg mr-3 group-hover:bg-red-100 transition"><Scale size={16} className="text-red-600"/></div>
                        <div><div className="text-xs font-extrabold text-slate-800">국가법령 (Law)</div><div className="text-[10px] text-slate-500 mt-0.5 font-medium">외부 법적 구속력</div></div>
                     </button>
                     <button onClick={() => { addNode('Regulation'); setIsAddModalOpen(false); }} className="flex items-center p-3 border border-slate-200 rounded-xl hover:border-blue-400 hover:shadow-md transition text-left bg-white group">
                        <div className="bg-blue-50 p-2.5 rounded-lg mr-3 group-hover:bg-blue-100 transition"><ShieldCheck size={16} className="text-blue-600"/></div>
                        <div><div className="text-xs font-extrabold text-slate-800">사내규정 (Regulation)</div><div className="text-[10px] text-slate-500 mt-0.5 font-medium">내부 운영 기준</div></div>
                     </button>
                     <button onClick={() => { addNode('Guideline'); setIsAddModalOpen(false); }} className="flex items-center p-3 border border-slate-200 rounded-xl hover:border-sky-400 hover:shadow-md transition text-left bg-white group">
                        <div className="bg-sky-50 p-2.5 rounded-lg mr-3 group-hover:bg-sky-100 transition"><BookOpen size={16} className="text-sky-600"/></div>
                        <div><div className="text-xs font-extrabold text-slate-800">지침 (Guideline)</div><div className="text-[10px] text-slate-500 mt-0.5 font-medium">매뉴얼, 가이드</div></div>
                     </button>
                     <button onClick={() => { addNode('Deliverable'); setIsAddModalOpen(false); }} className="flex items-center p-3 border border-slate-200 rounded-xl hover:border-sky-300 hover:shadow-md transition text-left bg-white group">
                        <div className="bg-sky-50 p-2.5 rounded-lg mr-3 group-hover:bg-sky-100 transition"><ClipboardCheck size={16} className="text-sky-500"/></div>
                        <div><div className="text-xs font-extrabold text-slate-800">산출물 (Deliverable)</div><div className="text-[10px] text-slate-500 mt-0.5 font-medium">보고서, 양식 등</div></div>
                     </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const AdminView = ({ users, onAddUser, onUpdateUser, onDeleteUser }) => {
      const [editingUser, setEditingUser] = useState(null);

      const handleSave = (e) => {
        e.preventDefault();
        if (editingUser.isNew) {
          const newUser = { ...editingUser };
          delete newUser.isNew;
          delete newUser.originalId;
          const success = onAddUser(newUser);
          if (success !== false) setEditingUser(null);
        } else {
          const updated = { ...editingUser };
          delete updated.originalId;
          const success = onUpdateUser(updated, editingUser.originalId);
          if (success !== false) setEditingUser(null);
        }
      };

      const handleAddClick = () => {
        setEditingUser({ id: '', pw: '', name: '', dept: '', role: 'Editor', needPwChange: true, isNew: true });
      };

      return (
        <div className="max-w-5xl mx-auto space-y-6 relative">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-xl font-bold text-slate-800">사용자 계정 및 권한 관리</h2>
            <button onClick={handleAddClick} className="bg-blue-600 text-white px-4 py-2.5 rounded-lg font-bold text-sm hover:bg-blue-700 flex items-center shadow-md transition">
              <Plus size={16} className="mr-2" /> 신규 계정 추가
            </button>
          </div>
          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table className="w-full text-left text-sm">
              <thead className="bg-slate-50 text-slate-600 border-b">
                <tr>
                  <th className="px-6 py-4 font-bold">ID (사번)</th>
                  <th className="px-6 py-4 font-bold">이름</th>
                  <th className="px-6 py-4 font-bold">소속 부서</th>
                  <th className="px-6 py-4 font-bold">시스템 권한</th>
                  <th className="px-6 py-4 font-bold">계정 상태</th>
                  <th className="px-6 py-4 font-bold text-right">관리</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {users.map(u => (
                  <tr key={u.id} className="hover:bg-slate-50 transition">
                    <td className="px-6 py-4 font-extrabold text-slate-800">{u.id}</td>
                    <td className="px-6 py-4">
                      <div className="flex items-center font-bold text-slate-700">
                        <div className="w-7 h-7 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold text-xs mr-3 shadow-sm">
                          {u.name.charAt(0)}
                        </div>
                        {u.name}
                      </div>
                    </td>
                    <td className="px-6 py-4 text-slate-500 font-medium">{u.dept}</td>
                    <td className="px-6 py-4">
                      <span className={`px-2.5 py-1 rounded-md text-xs font-bold shadow-sm border ${u.role === 'System Admin' ? 'bg-purple-50 text-purple-700 border-purple-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200'}`}>
                        {u.role}
                      </span>
                    </td>
                    <td className="px-6 py-4">
                      {u.needPwChange ? 
                        <span className="text-amber-500 font-bold text-xs flex items-center"><AlertCircle size={14} className="mr-1"/>비번 변경 대기</span> : 
                        <span className="text-blue-500 font-bold text-xs flex items-center"><CheckCircle size={14} className="mr-1"/>활성</span>
                      }
                    </td>
                    <td className="px-6 py-4 text-right">
                      <button onClick={() => setEditingUser({...u, originalId: u.id})} className="text-blue-600 hover:text-blue-800 font-bold text-xs mr-3 transition">수정</button>
                      <button onClick={() => onDeleteUser(u.id)} className="text-red-500 hover:text-red-700 font-bold text-xs transition disabled:opacity-30" disabled={u.id==='admin'}>삭제</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {editingUser && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50">
              <div className="bg-white p-8 rounded-2xl shadow-2xl w-[400px]">
                <h3 className="text-lg font-extrabold mb-6 text-slate-800 border-b pb-3">{editingUser.isNew ? '신규 계정 추가' : '계정 정보 수정'}</h3>
                <form onSubmit={handleSave} className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-700 mb-1.5">ID (사번/계정명)</label>
                    <input 
                      type="text" value={editingUser.id} 
                      onChange={e => {
                        if (editingUser.isNew) {
                          setEditingUser({...editingUser, id: e.target.value, pw: e.target.value});
                        } else {
                          setEditingUser({...editingUser, id: e.target.value});
                        }
                      }} 
                      className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium disabled:opacity-50 disabled:bg-slate-50" 
                      placeholder="사번 입력 (초기 비밀번호와 동일)" required
                      disabled={editingUser.originalId === 'admin'}
                    />
                    {editingUser.originalId === 'admin' && <p className="text-[10px] text-red-500 mt-1">최고 관리자 ID는 변경할 수 없습니다.</p>}
                  </div>
                  
                  <div>
                    <label className="block text-xs font-bold text-slate-700 mb-1.5">이름</label>
                    <input 
                      type="text" value={editingUser.name} 
                      onChange={e => setEditingUser({...editingUser, name: e.target.value})} 
                      className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium" required
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-700 mb-1.5">소속 부서</label>
                    <input 
                      type="text" value={editingUser.dept} 
                      onChange={e => setEditingUser({...editingUser, dept: e.target.value})} 
                      className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium" required
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-700 mb-1.5">시스템 권한 (Role)</label>
                    <select 
                      value={editingUser.role} 
                      onChange={e => setEditingUser({...editingUser, role: e.target.value})} 
                      className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium"
                    >
                      <option value="System Admin">System Admin (전체 권한)</option>
                      <option value="Editor">Editor (편집자)</option>
                      <option value="Viewer">Viewer (조회 전용)</option>
                    </select>
                  </div>
                  
                  {!editingUser.isNew && (
                    <div className="flex items-center pt-2 bg-slate-50 p-3 rounded-lg border border-slate-200 mt-2">
                      <input 
                        type="checkbox" id="pwReset" 
                        checked={editingUser.needPwChange} 
                        onChange={e => setEditingUser({...editingUser, needPwChange: e.target.checked, pw: editingUser.id})} 
                        className="mr-2" 
                      />
                      <label htmlFor="pwReset" className="text-xs font-bold text-slate-700 cursor-pointer leading-tight">
                        비밀번호 초기화<br/><span className="text-[10px] text-slate-500 font-medium">(사번으로 초기화 및 강제 변경 상태로 전환)</span>
                      </label>
                    </div>
                  )}

                  <div className="flex justify-end space-x-2 mt-8 pt-4 border-t border-slate-100">
                    <button 
                      type="button" onClick={() => setEditingUser(null)} 
                      className="px-4 py-2 text-sm font-bold text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 transition"
                    >
                      취소
                    </button>
                    <button 
                      type="submit" 
                      className="px-5 py-2 text-sm font-bold text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition shadow-md"
                    >
                      저장
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TaskOntologyApp />);
  </script>
</body>
</html>
