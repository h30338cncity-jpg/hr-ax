        <div className={`fixed bottom-4 right-4 text-white px-4 py-3 rounded shadow-lg flex items-center space-x-2 animate-bounce ${bgColor} z-50`}>
          {type === 'error' ? <ShieldAlert size={20} /> : <CheckCircle size={20} />}
          <span>{message}</span>
        </div>
      );
    };

    // ★ 상태(Status) 전용 입력 컴포넌트 ★
    const StatusInput = ({ val, nodeId, updateNodeMeta }) => {
      const options = ['미진행', '진행중', '보류', '완료'];
      const isCustom = val && !options.includes(val);
      const [mode, setMode] = useState(isCustom ? 'custom' : 'select');

      const handleSelect = (e) => {
        if (e.target.value === 'custom') {
          setMode('custom');
          updateNodeMeta(nodeId, '상태', '');
        } else {
          setMode('select');
          updateNodeMeta(nodeId, '상태', e.target.value);
        }
      };

      return (
        <div className="space-y-1.5 w-full">
          <select
            className="w-full text-sm border border-slate-300 bg-white px-3 py-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700 cursor-pointer transition"
            value={mode === 'custom' ? 'custom' : (val || '미진행')}
            onChange={handleSelect}
          >
            {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
            <option value="custom">직접 입력 (목록에 없음)...</option>
          </select>

          {mode === 'custom' && (
             <input
               type="text"
               className="w-full text-sm border border-slate-300 bg-white px-3 py-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 font-medium mt-1"
               value={val || ''} onChange={(e) => updateNodeMeta(nodeId, '상태', e.target.value)}
               placeholder="사용자 정의 상태를 입력하세요"
             />
          )}
        </div>
      );
    };

    // ★ 공통 가이드 & 커스텀 입력 컴포넌트 (데이터형태/산출물형태) ★
    const CustomSelectWithGuide = ({ val, nodeId, metaKey, guidesObj, updateNodeMeta, placeholder }) => {
      const isCustom = val && !Object.keys(guidesObj).includes(val);
      const [mode, setMode] = useState(isCustom ? 'custom' : 'select');

      const handleSelect = (e) => {
        if (e.target.value === 'custom') {
          setMode('custom');
          updateNodeMeta(nodeId, metaKey, '');
        } else {
          setMode('select');
          updateNodeMeta(nodeId, metaKey, e.target.value);
        }
      };

      return (
        <div className="space-y-1.5 w-full">
          <select
            className="w-full text-sm border border-slate-300 bg-white px-3 py-2 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 font-bold text-slate-700 cursor-pointer transition"
            value={mode === 'custom' ? 'custom' : (val || '')}
            onChange={handleSelect}
          >
            <option value="">선택...</option>
            {Object.keys(guidesObj).map(opt => <option key={opt} value={opt}>{opt}</option>)}
            <option value="custom">직접 입력 (목록에 없음)...</option>
          </select>

          {mode === 'custom' && (
             <input
               type="text"
               className="w-full text-sm border border-slate-300 bg-white px-3 py-2 rounded-lg outline-none focus:border-blue-500 font-medium mt-1"
               value={val || ''} onChange={(e) => updateNodeMeta(nodeId, metaKey, e.target.value)}
               placeholder={placeholder || "직접 입력하세요"}
             />
          )}

          {mode === 'select' && val && guidesObj[val] && (
            <p className="text-[10px] text-slate-500 font-medium bg-slate-100 p-1.5 rounded leading-tight">💡 {guidesObj[val]}</p>
          )}
        </div>
      );
    };

    // --- [Main App Component] ---
    function TaskOntologyApp() {
      const [usersDb, setUsersDb] = useState(() => {
        const saved = localStorage.getItem('ontologyUsersDB');
        return saved ? JSON.parse(saved) : defaultMockUsers;
      });
      
      const [currentUser, setCurrentUser] = useState(null);
      const [currentView, setCurrentView] = useState('login'); 
      const [toast, setToast] = useState(null);
      const [isAnytimePwModalOpen, setIsAnytimePwModalOpen] = useState(false);

      const showToast = (msg, type = 'success') => setToast({ message: msg, type });

      const saveUsersToDb = (newUsers) => {
        setUsersDb(newUsers);
        localStorage.setItem('ontologyUsersDB', JSON.stringify(newUsers));
      };

      const handleLogin = (id, pw) => {
        const user = usersDb.find(u => u.id === id);
        if (user && user.pw === pw) {
          setCurrentUser(user);
          if (user.needPwChange) {
            setCurrentView('pwChange');
          } else {
            setCurrentView('dashboard');
          }
          showToast(`${user.name}님 환영합니다!`);
          return true;
        } else {
          return false;
        }
      };

      const handlePasswordChangeSubmit = (newPw) => {
        const updatedUsers = usersDb.map(u => u.id === currentUser.id ? { ...u, pw: newPw, needPwChange: false } : u);
        saveUsersToDb(updatedUsers);
        setCurrentUser({ ...currentUser, pw: newPw, needPwChange: false });
        setCurrentView('dashboard');
        showToast('비밀번호가 성공적으로 변경되었습니다.');
        setIsAnytimePwModalOpen(false);
      };

      const handleAddUser = (newUser) => {
        if (usersDb.find(u => u.id === newUser.id)) {
          showToast('이미 존재하는 ID(사번)입니다.', 'error');
          return false;
        }
        saveUsersToDb([...usersDb, newUser]);
        showToast('신규 계정이 추가되었습니다.');
        return true;
      };

      const handleUpdateUser = (updatedUser, originalId = updatedUser.id) => {
        if (originalId !== updatedUser.id && usersDb.find(u => u.id === updatedUser.id)) {
          showToast('이미 존재하는 ID(사번)입니다.', 'error');
          return false;
        }
        const updatedList = usersDb.map(u => u.id === originalId ? updatedUser : u);
        saveUsersToDb(updatedList);
        if (currentUser.id === originalId) setCurrentUser(updatedUser);
        showToast('계정 정보가 성공적으로 반영되었습니다.');
        return true;
      };

      const handleDeleteUser = (userId) => {
        if (userId === 'admin') {
          showToast('최고 관리자 계정은 삭제할 수 없습니다.', 'error');
          return;
        }
        saveUsersToDb(usersDb.filter(u => u.id !== userId));
        showToast('계정이 삭제되었습니다.');
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setCurrentView('login');
        showToast('로그아웃 되었습니다.');
      };

      if (currentView === 'login') return <LoginView onLogin={handleLogin} />;
      if (currentView === 'pwChange') return <PasswordChangeView onSubmit={handlePasswordChangeSubmit} />;

      return (
        <div className="flex h-screen bg-slate-50 font-sans text-slate-800 selection:bg-blue-200 overflow-hidden">
          <aside className="w-64 bg-slate-900 text-slate-300 flex flex-col transition-all duration-300 shrink-0 shadow-2xl z-30">
            <div className="h-16 flex items-center px-6 font-bold text-white text-lg tracking-wide border-b border-slate-800 bg-slate-950">
              <Network className="mr-2 text-blue-500" size={24} />
              Ontology Map
            </div>
            <nav className="flex-1 py-6 space-y-1 px-3">
              <NavItem icon={<LayoutDashboard />} label="대시보드" active={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
              <NavItem icon={<Network />} label="온톨로지 맵 뷰어" active={currentView === 'map'} onClick={() => setCurrentView('map')} />
              <NavItem icon={<ListIcon />} label="전체 관계망 목록" active={currentView === 'links'} onClick={() => setCurrentView('links')} />
              {currentUser?.role === 'System Admin' && (
                <NavItem icon={<Users />} label="계정/권한 관리" active={currentView === 'admin'} onClick={() => setCurrentView('admin')} />
              )}
            </nav>
            <div className="p-4 border-t border-slate-800 bg-slate-950 flex flex-col space-y-3">
              <div className="flex items-center justify-between">
                <div className="flex items-center space-x-3">
                  <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold shadow-inner">
                    {currentUser?.name.charAt(0)}
                  </div>
                  <div className="text-sm">
                    <p className="text-white font-bold">{currentUser?.name}</p>
                    <p className="text-[10px] text-blue-300">{currentUser?.role}</p>
                  </div>
                </div>
              </div>
              <div className="flex items-center space-x-2 pt-2 border-t border-slate-800">
                <button onClick={() => setIsAnytimePwModalOpen(true)} className="flex-1 flex items-center justify-center px-2 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded text-xs font-bold transition">
                  <Settings size={14} className="mr-1.5" /> 비밀번호
                </button>
                <button onClick={handleLogout} className="flex-1 flex items-center justify-center px-2 py-1.5 bg-red-900/30 hover:bg-red-800/50 text-red-300 rounded text-xs font-bold transition">
                  <LogOut size={14} className="mr-1.5" /> 로그아웃
                </button>
              </div>
            </div>
          </aside>

          <main className="flex-1 flex flex-col overflow-hidden relative min-w-0">
            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-10 shrink-0">
              <h1 className="text-lg font-extrabold text-slate-800">
                {currentView === 'dashboard' && '과제 및 품질 대시보드'}
                {currentView === 'map' && '온톨로지 맵 탐색기'}
                {currentView === 'links' && '전체 관계망 연결 목록'}
                {currentView === 'admin' && '시스템 관리자 전용 대시보드'}
              </h1>
            </header>

            <MapAndDashboardContainer 
              currentView={currentView} 
              setCurrentView={setCurrentView} 
              showToast={showToast} 
              currentUser={currentUser} 
              usersDb={usersDb} 
              onAddUser={handleAddUser}
              onUpdateUser={handleUpdateUser}
              onDeleteUser={handleDeleteUser}
            />
          </main>
          
          {isAnytimePwModalOpen && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50">
               <PasswordChangeForm onClose={() => setIsAnytimePwModalOpen(false)} onSubmit={handlePasswordChangeSubmit} currentPwReq={true} userPw={currentUser.pw} />
            </div>
          )}

          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    const NavItem = ({ icon, label, active, onClick }) => (
      <button 
        onClick={onClick}
        className={`w-full flex items-center px-4 py-2.5 text-sm font-semibold rounded-lg transition-all ${
          active ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-100'
        }`}
      >
        <span className="mr-3">{icon}</span>
        {label}
      </button>
    );

    const LoginView = ({ onLogin }) => {
      const [id, setId] = useState('');
      const [pw, setPw] = useState('');
      const [errorMsg, setErrorMsg] = useState('');

      const handleSubmit = () => {
        const success = onLogin(id, pw);
        if (!success) {
          setErrorMsg('아이디(사번) 또는 비밀번호가 일치하지 않습니다.');
          alert('아이디(사번) 또는 비밀번호가 틀렸습니다.\n다시 확인해 주세요.');
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-slate-100">
          <div className="bg-white p-10 rounded-2xl shadow-2xl w-[400px]">
            <div className="flex justify-center mb-6">
              <div className="bg-blue-600 p-4 rounded-2xl text-white shadow-lg"><Network size={40} /></div>
            </div>
            <h2 className="text-2xl font-extrabold text-center text-slate-800 mb-2">온톨로지 맵 시스템</h2>
            <p className="text-center text-sm text-slate-500 mb-8 font-medium">관리자가 발급한 사번과 비밀번호로 로그인하세요.</p>
            <div className="space-y-5">
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-1.5">ID (사번)</label>
                <input 
                  type="text" value={id} onChange={e => { setId(e.target.value); setErrorMsg(''); }} 
                  className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition font-medium" 
                  placeholder="사번을 입력하세요" 
                />
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-1.5">비밀번호</label>
                <input 
                  type="password" value={pw} onChange={e => { setPw(e.target.value); setErrorMsg(''); }} 
                  className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition font-medium" 
                  placeholder="••••••••" 
                  onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                />
              </div>
              {errorMsg && (
                <div className="text-red-600 text-xs font-bold text-center bg-red-50 py-2 px-3 rounded-lg border border-red-200">
                  {errorMsg}
                </div>
              )}
              <button 
                onClick={handleSubmit} 
                className="w-full bg-blue-600 text-white py-3 rounded-lg font-extrabold hover:bg-blue-700 transition-colors mt-2 shadow-md"
              >
                로그인
              </button>
            </div>
            <div className="mt-8 text-center text-xs text-slate-400 font-medium bg-slate-50 p-3 rounded-lg">
              * 초기 로그인 시 비밀번호 변경 절차가 진행될 수 있습니다.<br/>
              * 계정 발급 문의: 인사/조직문화팀
            </div>
          </div>
        </div>
      );
    };

    const PasswordChangeView = ({ onSubmit }) => (
      <div className="min-h-screen flex items-center justify-center bg-slate-100">
        <PasswordChangeForm onClose={null} onSubmit={onSubmit} currentPwReq={false} />
      </div>
    );

    const PasswordChangeForm = ({ onClose, onSubmit, currentPwReq, userPw }) => {
      const [currentPw, setCurrentPw] = useState('');
      const [newPw, setNewPw] = useState('');
      const [confirmPw, setConfirmPw] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = () => {
        if (currentPwReq && currentPw !== userPw) {
          setError('현재 비밀번호가 일치하지 않습니다.'); return;
        }
        if (newPw.length < 4) {
          setError('새 비밀번호는 4자리 이상이어야 합니다.'); return;
        }
        if (newPw !== confirmPw) {
          setError('새 비밀번호와 확인이 일치하지 않습니다.'); return;
        }
        onSubmit(newPw);
      };

      return (
        <div className="bg-white p-8 rounded-2xl shadow-2xl w-[400px] border-t-4 border-amber-500 relative">
          {onClose && (
            <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><X size={20}/></button>
          )}
          <div className="flex items-center space-x-2 mb-6">
            <Lock className="text-amber-500" size={28} />
            <h2 className="text-xl font-extrabold text-slate-800">비밀번호 변경</h2>
          </div>
          <p className="text-sm text-slate-600 mb-6 font-medium leading-relaxed">
            보안을 위해 비밀번호를 변경해 주세요. 변경된 비밀번호로 즉시 로그인 상태가 유지됩니다.
          </p>
          <div className="space-y-4">
            {currentPwReq && (
              <div>
                <label className="block text-xs font-bold text-slate-600 mb-1">현재 비밀번호</label>
                <input type="password" value={currentPw} onChange={e=>setCurrentPw(e.target.value)} className="w-full px-4 py-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-amber-200 focus:border-amber-400 font-medium" />
              </div>
            )}
            <div>
              <label className="block text-xs font-bold text-slate-600 mb-1">새 비밀번호</label>
              <input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} className="w-full px-4 py-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-amber-200 focus:border-amber-400 font-medium" />
            </div>
            <div>
              <label className="block text-xs font-bold text-slate-600 mb-1">새 비밀번호 확인</label>
              <input type="password" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)} className="w-full px-4 py-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-amber-200 focus:border-amber-400 font-medium" />
            </div>
            
            {error && <p className="text-xs font-bold text-red-500 bg-red-50 p-2 rounded">{error}</p>}
            
            <button onClick={handleSubmit} className="w-full bg-amber-500 text-white py-3 rounded-lg font-extrabold hover:bg-amber-600 shadow-md mt-2 transition">
              변경 완료 및 저장
            </button>
          </div>
        </div>
      );
    };

    const MapAndDashboardContainer = ({ currentView, setCurrentView, showToast, currentUser, usersDb, onAddUser, onUpdateUser, onDeleteUser }) => {
      const [nodes, setNodes] = useState([]);
      const [edges, setEdges] = useState([]);
      const [isLoaded, setIsLoaded] = useState(false);

      useEffect(() => {
        try {
          const saved = localStorage.getItem('ontologyMapDB');
          if (saved) {
            const parsed = JSON.parse(saved);
            setNodes(parsed.nodes || []);
            setEdges(parsed.edges || []);
          }
        } catch (error) {
          console.error("Local storage load failed", error);
        } finally {
          setIsLoaded(true);
        }
      }, []);

      useEffect(() => {
        if (!isLoaded) return;
        try {
          localStorage.setItem('ontologyMapDB', JSON.stringify({ nodes, edges }));
        } catch (error) {
          console.error("Auto-save failed", error);
        }
      }, [nodes, edges, isLoaded]);

      const handleSaveMap = useCallback(() => {
        try {
          localStorage.setItem('ontologyMapDB', JSON.stringify({ nodes, edges }));
          showToast('맵 구조가 안전하게 저장되었습니다.', 'success');
        } catch(e) {
          showToast('저장 공간(용량) 부족으로 실패했습니다.', 'error');
        }
      }, [nodes, edges, showToast]);

      if (!isLoaded) return null; 

      return (
        <div className="flex-1 overflow-hidden relative bg-slate-50/50 flex flex-col">
          {currentView === 'dashboard' && <div className="p-4 md:p-6 overflow-auto h-full"><DashboardView onNavMap={() => setCurrentView('map')} nodes={nodes} edges={edges} currentUser={currentUser} /></div>}
          {currentView === 'map' && <MapView nodes={nodes} setNodes={setNodes} edges={edges} setEdges={setEdges} handleSaveMap={handleSaveMap} showToast={showToast} users={usersDb} />}
          {currentView === 'links' && <div className="p-4 md:p-6 overflow-auto h-full"><LinkListView nodes={nodes} edges={edges} setEdges={setEdges} onNavMap={() => setCurrentView('map')} showToast={showToast} /></div>}
          {currentView === 'admin' && <div className="p-4 md:p-6 overflow-auto h-full"><AdminView users={usersDb} onAddUser={onAddUser} onUpdateUser={onUpdateUser} onDeleteUser={onDeleteUser} /></div>}
        </div>
      );
    };

    const DashboardView = ({ onNavMap, nodes, edges, currentUser }) => {
      const myNodes = nodes.filter(n => (n.meta?.담당자 || '').includes(currentUser?.name || ''));
      const myEdgesCount = edges.filter(e => myNodes.some(n => n.id === e.source || n.id === e.target)).length;

      const connectedNodes = nodes.filter(n => edges.some(e => e.source === n.id || e.target === n.id));
      const connectedTaskCount = connectedNodes.filter(n => n.type === 'Task').length;
      const connectedDataCount = connectedNodes.filter(n => n.type === 'Data').length;
      const connectedSystemCount = connectedNodes.filter(n => n.type === 'System').length;
      const connectedDocCount = connectedNodes.filter(n => ['Law', 'Regulation', 'Guideline', 'Deliverable'].includes(n.type)).length;

      const myTasks = myNodes.filter(n => n.type === 'Task').sort((a, b) => {
        const dateA = a.meta?.종료일 ? new Date(a.meta.종료일).getTime() : Infinity;
        const dateB = b.meta?.종료일 ? new Date(b.meta.종료일).getTime() : Infinity;
        return dateA - dateB;
      });

      const getDDayText = (dateStr) => {
        if (!dateStr) return <span className="text-slate-400 text-xs font-bold bg-slate-100 px-2 py-1 rounded">기한 없음</span>;
        const end = new Date(dateStr);
        end.setHours(23, 59, 59, 999);
        const diff = Math.ceil((end - new Date()) / (1000 * 60 * 60 * 24));
        
        if (diff < 0) return <span className="text-red-600 bg-red-50 border border-red-200 px-2 py-1 rounded text-xs font-bold">D+{Math.abs(diff)} (지연)</span>;
        if (diff === 0) return <span className="text-amber-600 bg-amber-50 border border-amber-200 px-2 py-1 rounded text-xs font-bold">D-Day</span>;
        if (diff <= 7) return <span className="text-orange-600 bg-orange-50 border border-orange-200 px-2 py-1 rounded text-xs font-bold">D-{diff}</span>;
        return <span className="text-blue-600 bg-blue-50 border border-blue-200 px-2 py-1 rounded text-xs font-bold">D-{diff}</span>;
      };

      return (
        <div className="space-y-6 max-w-6xl mx-auto pb-10">
          <h2 className="text-lg font-bold text-slate-800">나의 담당 현황</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-2xl shadow-lg flex flex-col justify-between text-white relative overflow-hidden">
              <div className="absolute -right-4 -top-4 opacity-20"><Briefcase size={120} /></div>
              <p className="text-sm font-semibold opacity-90 relative z-10">내가 담당하는 객체 (과제 등)</p>

    // ★ [신규 화면] 전체 관계망 목록 뷰 ★
    const LinkListView = ({ nodes, edges, setEdges, onNavMap, showToast }) => {

                  <tr>
                    <th className="px-6 py-4 font-bold w-1/4">시작 객체 (Node A)</th>
                    <th className="px-2 py-4 font-bold text-center w-16">방향</th>
                    <th className="px-6 py-4 font-bold w-1/4">대상 객체 (Node B)</th>

                </thead>
                <tbody className="divide-y divide-slate-100">
                  {edges.map(e => {

                    return (
                      <tr key={e.id} className="hover:bg-slate-50 transition">

                        <td className="px-2 py-4 text-center text-slate-400 font-bold">
                           {e.direction === 'both' ? '⟷' : e.direction === 'none' ? '―' : '➔'}
                        </td>
                        <td className="px-6 py-4">
                           <div className="flex items-center">
                             <span className="w-2.5 h-2.5 rounded-full mr-2 shrink-0" style={{backgroundColor: t.color}}></span>
                             <div className="truncate font-extrabold text-slate-800" title={t.label}>{t.label}</div>

                        <td className="px-6 py-4">
                           <div className="flex items-center text-xs font-bold text-indigo-700 mb-1">
                             {e.method === 'manual' ? <Edit3 size={12} className="mr-1"/> : <Zap size={12} className="mr-1"/>}
                             {methodNames[e.method]}
                           </div>
                           <div className="text-xs text-slate-600 font-medium truncate" title={e.progress || e.label || '내용 없음'}>
                             {e.progress || e.label || <span className="text-slate-300 italic">메모 없음</span>}
                           </div>
                        </td>
                        <td className="px-6 py-4 text-right">
                          <button onClick={onNavMap} className="text-blue-600 hover:text-blue-800 font-bold text-xs mr-3 transition" title="맵에서 위치 보기">맵 이동</button>
                          <button onClick={() => handleDeleteEdge(e.id)} className="text-red-500 hover:text-red-700 font-bold text-xs transition" title="연결 삭제">삭제</button>

                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>
        </div>
      );
    };

    const MapView = ({ nodes, setNodes, edges, setEdges, handleSaveMap, showToast, users }) => {
      const [past, setPast] = useState([]);
      const [future, setFuture] = useState([]);

      const [selectedId, setSelectedId] = useState(null); 
      const [selectionType, setSelectionType] = useState(null); 
      
      const [dragging, setDragging] = useState(null); 
      
      const [connectMode, setConnectMode] = useState(false);
      const [connectSource, setConnectSource] = useState(null);
      
      const [isPanelOpen, setIsPanelOpen] = useState(false); 
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      
      // ★ 엣지 호버 상태 추가 ★
      const [hoveredNode, setHoveredNode] = useState(null);
      const [hoveredEdge, setHoveredEdge] = useState(null);

      const [transform, setTransform] = useState({ x: 0, y: 0, k: 1 });
      const [isPanning, setIsPanning] = useState(false);
      const [panStart, setPanStart] = useState({ x: 0, y: 0 });
      const svgRef = useRef(null);
      const mapContainerRef = useRef(null);

      const [showLayerPanel, setShowLayerPanel] = useState(false);
      const [layers, setLayers] = useState({
        Law: true, Regulation: true, Guideline: true, Data: true, System: true, Task: true, Deliverable: true
      });

      const toggleLayer = (type) => setLayers(p => ({ ...p, [type]: !p[type] }));

      const visibleNodes = nodes.filter(n => layers[n.type]);
      const visibleEdges = edges.filter(e => {
        const s = nodes.find(n => n.id === e.source);
        const t = nodes.find(n => n.id === e.target);
        return s && t && layers[s.type] && layers[t.type];
      });

      const saveState = useCallback((prevNodes = nodes, prevEdges = edges) => {
        setPast(prev => [...prev, { nodes: prevNodes, edges: prevEdges }]);
        setFuture([]);
      }, [nodes, edges]);

      const undo = useCallback(() => {
        if (past.length === 0) return;
        const previous = past[past.length - 1];
        setFuture(prev => [{ nodes, edges }, ...prev]);
        setPast(prev => prev.slice(0, prev.length - 1));
        setNodes(previous.nodes);
        setEdges(previous.edges);
      }, [past, nodes, edges, setNodes, setEdges]);

      const redo = useCallback(() => {
        if (future.length === 0) return;
        const next = future[0];
        setPast(prev => [...prev, { nodes, edges }]);
        setFuture(prev => prev.slice(1));
        setNodes(next.nodes);
        setEdges(next.edges);
      }, [future, nodes, edges, setNodes, setEdges]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

          if (e.ctrlKey || e.metaKey) {
            if (e.key === 's' || e.key === 'S') {
              e.preventDefault();
              handleSaveMap();
            } else if (e.key === 'z' || e.key === 'Z') {
              if (e.shiftKey) { e.preventDefault(); redo(); }
              else { e.preventDefault(); undo(); }
            } else if (e.key === 'y' || e.key === 'Y') {
              e.preventDefault();
              redo();
            }
          }
        };

        const handleWheel = (e) => {
          if (!mapContainerRef.current?.contains(e.target)) return;
          
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            const scaleFactor = -e.deltaY * 0.001;
            setTransform(prev => {
              const newK = Math.min(Math.max(0.2, prev.k + scaleFactor), 3); 
              return { ...prev, k: newK };
            });
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('wheel', handleWheel, { passive: false });
        return () => {
          window.removeEventListener('keydown', handleKeyDown);
          window.removeEventListener('wheel', handleWheel);
        };
      }, [handleSaveMap, undo, redo]);


      const handleAutoAlign = () => {
        saveState();
        
        let newNodes = [...nodes];
        const gapX = 180;   
        
        for (let pass = 0; pass < 3; pass++) {
          SWIMLANES.forEach(lane => {
            const laneNodes = newNodes.filter(n => lane.types.includes(n.type));
            if (laneNodes.length === 0) return;

            laneNodes.forEach(node => {
              const connected = edges.filter(e => e.source === node.id || e.target === node.id);
              if (connected.length > 0) {
                let sumX = 0;
                connected.forEach(e => {
                  const neighborId = e.source === node.id ? e.target : e.source;
                  const neighbor = newNodes.find(n => n.id === neighborId);
                  if (neighbor) sumX += neighbor.x;
                });
                node.targetX = sumX / connected.length;
                node.weight = connected.length; 
              } else {
                node.targetX = node.x;
                node.weight = 0;
              }
            });

            laneNodes.sort((a, b) => {
              if (lane.id === 'l_tsk') {
                return (a.label || '').localeCompare(b.label || '', 'ko-KR');
              }
              if (Math.abs(a.targetX - b.targetX) > 1) return a.targetX - b.targetX;
              return b.weight - a.weight;
            });

            const centerY = lane.y + (lane.h / 2);
            const totalWidth = (laneNodes.length - 1) * gapX;
            
            const mapContainer = mapContainerRef.current;
            const centerScreenX = mapContainer ? mapContainer.clientWidth / 2 : 800;
            const laneStartX = Math.max(100, centerScreenX - (totalWidth / 2));

            laneNodes.forEach((node, idx) => {
              node.x = laneStartX + (idx * gapX);
              node.y = centerY;
            });
          });
        }
        
        setNodes(newNodes);
        showToast('연결 관계를 분석하여 맵이 최적의 형태로 정렬되었습니다.', 'success');
      };


      const handleBackgroundMouseDown = (e) => {
        if (!connectMode) {
          setSelectedId(null);
          setSelectionType(null);
          setIsPanelOpen(false);
          setIsPanning(true);
          setPanStart({ x: e.clientX, y: e.clientY });
        }
      };

      const handleNodeMouseDown = (e, id) => {
        e.stopPropagation(); 
        if (connectMode) {
          if (!connectSource) {
            setConnectSource(id);
            showToast('대상 노드를 클릭하면 선이 연결됩니다.', 'success');
          } else {
            if (connectSource !== id) {
              saveState();
              // ★ 양방향성을 지원하기 위해 초기 direction 속성 추가 ★
              const newEdge = { id: `e_${Date.now()}`, source: connectSource, target: id, label: '', method: 'manual', logic: '', progress: '', direction: 'forward' };
              setEdges([...edges, newEdge]);
              showToast('성공적으로 연결되었습니다. 우측에서 규칙을 설정하세요.', 'success');
            }
            setConnectMode(false);
            setConnectSource(null);
          }
          return;
        }
        setDragging(id);
        setSelectedId(id);
        setSelectionType('node');
        if (!isPanelOpen) setIsPanelOpen(true);
      };

      const handleEdgeClick = (e, id) => {
        e.stopPropagation();
        if (connectMode) return;
        setSelectedId(id);
        setSelectionType('edge');
        if (!isPanelOpen) setIsPanelOpen(true);
      };

      const handleMouseMove = (e) => {
        if (isPanning) {
          const dx = e.clientX - panStart.x;
          const dy = e.clientY - panStart.y;
          setTransform(prev => ({ ...prev, x: prev.x + dx, y: prev.y + dy }));
          setPanStart({ x: e.clientX, y: e.clientY });
          return;
        }

        if (!dragging || !svgRef.current) return;
        
        const pt = svgRef.current.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const svgP = pt.matrixTransform(svgRef.current.getScreenCTM().inverse());
        
        setNodes(prev => prev.map(n => {
          if (n.id === dragging) {
            let targetY = (svgP.y - transform.y) / transform.k;
            const lane = SWIMLANES.find(l => l.types.includes(n.type));
            if (lane) {
               targetY = Math.max(lane.y + 25, Math.min(lane.y + lane.h - 25, targetY));
            }
            return { 
              ...n, 
              x: (svgP.x - transform.x) / transform.k, 
              y: targetY 
            };
          }
          return n;
        }));
      };

      const handleMouseUp = () => {
        if (isPanning) setIsPanning(false);
        if (dragging) {
          saveState(nodes, edges); 
        }
        setDragging(null);
      };

      const addNode = (type) => {
        saveState();
        const labels = { 
          'Task': '새로운 과제', 'Data': '새로운 데이터', 'System': '새로운 시스템',
          'Law': '새로운 국가법령', 'Regulation': '새로운 사내규정', 'Guideline': '새로운 지침', 'Deliverable': '새로운 산출물'
        };
        const mapContainer = mapContainerRef.current;
        const cw = mapContainer ? mapContainer.clientWidth / 2 : 300;
        
        const lane = SWIMLANES.find(l => l.types.includes(type));
        const cx = (cw - transform.x) / transform.k;
        const cy = lane ? lane.y + (lane.h / 2) : 300;

        const newNode = {
          id: `n_${Date.now()}`,
          type,
          label: labels[type],
          x: cx + (Math.random() - 0.5) * 50,
          y: cy + (Math.random() - 0.5) * 50,
          color: typeColors[type],
          meta: { ...defaultMeta[type] }
        };
        setNodes([...nodes, newNode]);
        setSelectedId(newNode.id);
        setSelectionType('node');
        if (!layers[type]) toggleLayer(type); 
        if (!isPanelOpen) setIsPanelOpen(true);
      };

      const deleteSelected = () => {
        saveState();
        if (selectionType === 'node') {
          setNodes(nodes.filter(n => n.id !== selectedId));
          setEdges(edges.filter(e => e.source !== selectedId && e.target !== selectedId));
        } else if (selectionType === 'edge') {
          setEdges(edges.filter(e => e.id !== selectedId));
        }
        setSelectedId(null);
        setSelectionType(null);
        setIsPanelOpen(false);
        showToast('삭제되었습니다.');
      };

      const handleCapture = async () => {
        if (!mapContainerRef.current) return;
        try {
          showToast('이미지 캡처 중입니다...', 'success');
          const canvas = await html2canvas(mapContainerRef.current, {
            backgroundColor: '#f8fafc',
            scale: 2
          });
          const image = canvas.toDataURL("image/png");
          const link = document.createElement('a');
          link.href = image;
          link.download = `온톨로지맵_${new Date().toISOString().split('T')[0]}.png`;
          link.click();
          showToast('이미지가 다운로드 되었습니다.', 'success');
        } catch (err) {
          console.error(err);
          showToast('이미지 캡처에 실패했습니다.', 'error');
        }
      };


      const updateNodeType = (id, newType) => {
        saveState();
        setNodes(nodes.map(n => {
          if (n.id === id) {
            const newMeta = { ...defaultMeta[newType] };
            Object.keys(n.meta).forEach(k => {
              if (k === '상태' || k === '첨부파일' || !Object.keys(defaultMeta[n.type]).includes(k)) {
                newMeta[k] = n.meta[k]; 
              }
            });
            
            const lane = SWIMLANES.find(l => l.types.includes(newType));
            const newY = lane ? lane.y + (lane.h / 2) + (Math.random() * 20 - 10) : n.y;

            return { ...n, type: newType, color: typeColors[newType], meta: newMeta, y: newY };
          }
          return n;
        }));
      };

      const updateNode = (id, key, value) => {
        setNodes(nodes.map(n => n.id === id ? { ...n, [key]: value } : n));
      };

      const updateNodeMeta = (id, metaKey, value) => {
        setNodes(nodes.map(n => n.id === id ? { ...n, meta: { ...n.meta, [metaKey]: value } } : n));
      };

      const renameNodeMetaKey = (id, oldKey, newKey) => {
        if (!newKey || oldKey === newKey) return;
        setNodes(nodes.map(n => {
          if (n.id === id) {
            const newMeta = { ...n.meta };
            newMeta[newKey] = newMeta[oldKey];
            delete newMeta[oldKey];
            return { ...n, meta: newMeta };
          }
          return n;
        }));
      };

      const deleteNodeMetaKey = (id, key) => {
        setNodes(nodes.map(n => {
          if (n.id === id) {
            const newMeta = { ...n.meta };
            delete newMeta[key];
            return { ...n, meta: newMeta };
          }
          return n;
        }));
      };

      const updateEdge = (id, key, value) => {
        if (key === 'method') saveState(); 
        setEdges(edges.map(e => e.id === id ? { ...e, [key]: value } : e));
      };

      const addMemo = (nodeId) => {
        saveState();
        updateNodeMeta(nodeId, `메모_${Math.floor(Math.random() * 1000)}`, '');
      };

      const handleFileUpload = (e, nodeId) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 2 * 1024 * 1024) {
            showToast('파일 크기가 너무 큽니다. 프로토타입 환경에서는 2MB 이하의 파일만 허용됩니다.', 'error');
            return;
          }
          const reader = new FileReader();
          reader.onload = (event) => {
            const fileData = { name: file.name, url: event.target.result };
            updateNodeMeta(nodeId, '첨부파일', fileData);
            showToast(`[${file.name}] 파일이 안전하게 첨부 및 저장되었습니다.`);
          };
          reader.readAsDataURL(file);
        }
      };

      const getConnectedObjects = (nodeId) => {
        return edges.filter(e => e.source === nodeId || e.target === nodeId).map(edge => {
          const isSource = edge.source === nodeId;
          const connectedNodeId = isSource ? edge.target : edge.source;
          const connectedNode = nodes.find(n => n.id === connectedNodeId);
          return { edge, node: connectedNode, direction: isSource ? 'outgoing' : 'incoming' };
        }).filter(item => item.node); 
      };

      const isNodeConnectedToHover = (nodeId) => {
        if (!hoveredNode || hoveredNode === nodeId) return true;
        return visibleEdges.some(e => (e.source === hoveredNode && e.target === nodeId) || (e.target === hoveredNode && e.source === nodeId));
      };

      const isEdgeConnectedToHover = (edge) => {
        if (!hoveredNode) return true;
        return edge.source === hoveredNode || edge.target === hoveredNode;
      };

      const renderMetaInput = (key, val, nodeId) => {
        const isUrl = val && typeof val === 'string' && (val.startsWith('http') || val.startsWith('www') || val.startsWith('link.'));

        // 날짜 필드
        if (['시작일', '종료일', '시행일', '생성일'].includes(key)) {
          return (
            <input 
              type="date" 
              className="w-full text-sm border border-slate-300 bg-white px-3 py-2 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 font-medium transition" 
              value={val || ''} onChange={(e) => updateNodeMeta(nodeId, key, e.target.value)} 
            />
          );
        }
        
        // 담당자, 승인자: 수동입력 + 드롭다운 편의성 결합
        if (['담당자', '승인자'].includes(key)) {
          const currentUsers = val ? val.split(',').map(s=>s.trim()).filter(Boolean) : [];
          const toggleUser = (userName) => {
            if(currentUsers.includes(userName)) updateNodeMeta(nodeId, key, currentUsers.filter(u => u !== userName).join(', '));
            else updateNodeMeta(nodeId, key, [...currentUsers, userName].join(', '));
          };
          
          return (
            <div className="space-y-2">
              <select 
                className="w-full text-sm border border-slate-300 bg-white px-3 py-2 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 cursor-pointer font-bold text-slate-600 transition" 
                onChange={(e) => { if(e.target.value) toggleUser(e.target.value); e.target.value=''; }}
                defaultValue=""
              >
                <option value="">+ 계정 선택 (목록에서 추가)</option>
                {[...(users || [])].sort((a, b) => a.name.localeCompare(b.name, 'ko-KR')).map(u => <option key={u.id} value={u.name}>{u.name} ({u.dept})</option>)}
              </select>
              <input 
                type="text" 
                className="w-full text-sm border border-slate-300 bg-white px-3 py-2 rounded-lg outline-none focus:border-blue-500 font-medium transition" 
                value={val || ''} onChange={(e) => updateNodeMeta(nodeId, key, e.target.value)} 
                placeholder="또는 직접 입력 (쉼표로 구분)" 
              />
              {currentUsers.length > 0 && (
                <div className="flex flex-wrap gap-1.5 mt-1">
                  {currentUsers.map(u => (
                    <span key={u} className="inline-flex items-center px-2 py-1 rounded bg-blue-100 text-blue-700 text-xs font-bold shadow-sm">
                      {u} <button onClick={() => toggleUser(u)} className="ml-1 hover:text-blue-900 bg-blue-200 rounded-full p-0.5"><X size={10}/></button>
                    </span>
                  ))}
                </div>
              )}
            </div>
          );
        }

        // 데이터형태: 수동입력 가능한 콤보박스
        if (key === '데이터형태') {
          return <CustomSelectWithGuide val={val} nodeId={nodeId} metaKey={key} guidesObj={dataTypeGuides} updateNodeMeta={updateNodeMeta} placeholder="원하는 데이터 형태를 직접 입력하세요" />;
        }

        // 산출물형태: 수동입력 가능한 콤보박스
        if (key === '산출물형태') {
          return <CustomSelectWithGuide val={val} nodeId={nodeId} metaKey={key} guidesObj={deliverableTypeGuides} updateNodeMeta={updateNodeMeta} placeholder="원하는 산출물 형태를 직접 입력하세요" />;
        }

        // 긴 텍스트 필드
        if (key === '진행상황' || key === '설명') {
          return (
            <textarea 
              className="w-full text-sm border border-slate-300 bg-white px-3 py-2 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 font-medium transition resize-y min-h-[80px]" 
              value={val || ''} onChange={(e) => updateNodeMeta(nodeId, key, e.target.value)} 
              placeholder={key === '설명' ? "이 객체가 무엇을 의미하는지 상세한 설명을 작성해주세요." : "현재 어디까지 진행되었고 무엇을 해야하는지 상세히 작성해주세요."} 
            />
          );
        }

        // 기본 텍스트 필드
        let placeholder = "값을 입력하세요";
        if (key === '목적') placeholder = "과제의 목적을 입력하세요.";
        if (key === '데이터셋명') placeholder = "데이터명을 입력하세요.";

        return (
          <div className="relative flex items-center w-full">
            <input 
              type="text" 
              className={`w-full text-sm border border-slate-300 bg-white px-3 py-2 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 font-medium transition ${isUrl ? 'pr-8 text-blue-600 underline' : 'text-slate-800'}`} 
              value={val || ''} onChange={(e) => updateNodeMeta(nodeId, key, e.target.value)} 
              placeholder={placeholder} 
            />
            {isUrl && (
              <a 
                href={val.startsWith('http') ? val : `https://${val}`} 
                target="_blank" rel="noreferrer" 
                className="absolute right-2.5 p-1 rounded-md text-blue-500 hover:bg-blue-50 hover:text-blue-700 transition"
                title="새 창에서 링크 열기"
              >
                <ExternalLink size={14} />
              </a>
            )}
          </div>
        );
      };

      const selectedNodeObj = selectionType === 'node' ? nodes.find(n => n.id === selectedId) : null;
      const selectedEdgeObj = selectionType === 'edge' ? edges.find(e => e.id === selectedId) : null;

      // ★ 연결선 속성 편집용 헤더 노드 추출 ★
      const edgeSourceNode = selectedEdgeObj ? nodes.find(n => n.id === selectedEdgeObj.source) : null;
      const edgeTargetNode = selectedEdgeObj ? nodes.find(n => n.id === selectedEdgeObj.target) : null;

      return (
        <div className="flex h-full rounded-2xl bg-white shadow-lg border border-slate-200 overflow-hidden flex-col relative">
          
          {/* 상단 툴바 */}
          <div className="bg-white border-b border-slate-200 p-2.5 flex items-center justify-between z-10 px-5 shrink-0 shadow-sm relative">
            <div className="flex items-center space-x-4">
              <div className="flex items-center space-x-1 border-r border-slate-200 pr-4">
                <button onClick={undo} disabled={past.length === 0} className="p-2 hover:bg-slate-100 rounded-lg text-slate-600 disabled:opacity-30 transition" title="실행 취소 (Ctrl+Z)"><Undo2 size={16} /></button>
                <button onClick={redo} disabled={future.length === 0} className="p-2 hover:bg-slate-100 rounded-lg text-slate-600 disabled:opacity-30 transition" title="다시 실행 (Ctrl+Y)"><Redo2 size={16} /></button>
              </div>

              <div className="flex items-center space-x-2 border-r border-slate-200 pr-4">
                <button onClick={() => setIsAddModalOpen(true)} className="flex items-center px-4 py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-lg text-sm font-extrabold transition">
                  <Plus size={16} className="mr-1.5" /> 노드 추가
                </button>
                <button onClick={() => { setConnectMode(!connectMode); setConnectSource(null); }} className={`flex items-center px-4 py-2 rounded-lg text-sm font-extrabold transition ${connectMode ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-50 hover:bg-slate-100 text-slate-700'}`}>
                  <LinkIcon size={16} className="mr-1.5" /> {connectMode ? '연결 모드 취소' : '선 연결'}
                </button>
              </div>
              
              <div className="flex items-center space-x-2 border-r border-slate-200 pr-4">
                 <button onClick={handleAutoAlign} className="flex items-center px-3 py-2 hover:bg-slate-100 text-slate-700 rounded-lg text-sm font-bold transition shadow-sm border border-slate-200" title="연결망 분석 기반 자동 정렬">
                   <AlignCenter size={16} className="mr-1.5" /> 자동 정렬
                 </button>
              </div>

              <div className="flex items-center border-r border-slate-200 pr-4">
                <button onClick={deleteSelected} disabled={!selectedId} className="flex items-center px-3 py-2 hover:bg-red-50 text-red-500 rounded-lg text-sm font-bold transition disabled:opacity-30 disabled:bg-transparent" title="삭제 (Delete)">
                  <Trash2 size={16} className="mr-1.5" /> 삭제
                </button>
              </div>

              <div className="flex items-center relative">
                <button onClick={() => setShowLayerPanel(!showLayerPanel)} className={`flex items-center px-4 py-2 rounded-lg text-sm font-extrabold transition shadow-sm border ${showLayerPanel ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white hover:bg-slate-50 text-slate-700 border-slate-300'}`}>
                  <Layers size={16} className="mr-1.5" /> 레이어 필터
                </button>
                
                {showLayerPanel && (
                  <div className="absolute top-12 left-0 w-56 bg-white border border-slate-200 rounded-xl shadow-2xl p-4 z-50">
                    <div className="flex justify-between items-center border-b border-slate-100 pb-2 mb-3">
                      <span className="text-xs font-extrabold text-slate-500 uppercase">보기 설정</span>
                      <button onClick={() => setShowLayerPanel(false)} className="text-slate-400 hover:text-slate-700"><X size={14}/></button>
                    </div>
                    <div className="space-y-2">
                      {Object.keys(typeLabels).map(type => (
                        <label key={type} className="flex items-center p-2 hover:bg-slate-50 rounded cursor-pointer transition">
                          <input type="checkbox" checked={layers[type]} onChange={() => toggleLayer(type)} className="mr-3 w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500" />
                          <span className="w-3 h-3 rounded-full mr-2" style={{ backgroundColor: typeColors[type] }}></span>
                          <span className="text-sm font-bold text-slate-700">{typeLabels[type]}</span>
                        </label>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex items-center space-x-3">
              <button onClick={handleCapture} className="flex items-center px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-bold transition shadow-sm border border-slate-300" title="현재 화면을 이미지로 다운로드">
                <Camera size={16} className="mr-2" /> 이미지 캡처
              </button>
              <button onClick={handleSaveMap} className="flex items-center px-5 py-2 bg-slate-900 hover:bg-slate-800 text-white rounded-lg text-sm font-bold transition shadow-md" title="수동 저장 (Ctrl+S)">
                <Save size={16} className="mr-2" /> 맵 저장
              </button>
            </div>
          </div>

          <div className="flex flex-1 relative min-h-0 bg-slate-50 overflow-hidden no-select">
            
            <div 
              id="map-container"
              ref={mapContainerRef}
              className={`flex-1 relative overflow-hidden ${isPanning ? 'cursor-grabbing' : 'cursor-crosshair'}`} 
              onMouseMove={handleMouseMove} 
              onMouseUp={handleMouseUp} 
              onMouseLeave={handleMouseUp}
              onMouseDown={handleBackgroundMouseDown}
            >
              <svg ref={svgRef} className="w-full h-full pointer-events-none">
                <defs>
                  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform={`translate(${transform.x % 40}, ${transform.y % 40}) scale(${transform.k})`}>
                    <circle cx="2" cy="2" r="1.5" fill="#cbd5e1" />
                  </pattern>
                  
                  <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="4" stdDeviation="6" floodOpacity="0.1" />
                  </filter>

                  <marker id="arrow-green" viewBox="0 0 10 10" refX="24" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
                  </marker>
                  <marker id="arrow-red" viewBox="0 0 10 10" refX="24" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
                  </marker>
                  <marker id="arrow-blue-selected" viewBox="0 0 10 10" refX="24" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
                  </marker>
                </defs>

                <rect width="100%" height="100%" fill="url(#grid)" className="pointer-events-auto" onClick={(e) => { e.stopPropagation(); if(!connectMode) { setSelectedId(null); setSelectionType(null); setIsPanelOpen(false); setShowLayerPanel(false); } }} />
                
                <g transform={`translate(${transform.x}, ${transform.y}) scale(${transform.k})`} className="pointer-events-auto">
                  
                  {/* ★ 스윔레인 (배경 구역) 렌더링 ★ */}
                  {SWIMLANES.map(lane => (
                    <g key={lane.id}>
                      <rect x="-10000" y={lane.y} width="20000" height={lane.h} fill={lane.bg} />
                      <line x1="-10000" y1={lane.y + lane.h} x2="10000" y2={lane.y + lane.h} stroke="#cbd5e1" strokeWidth="2" strokeDasharray="10 10" />
                      <text 
                        x={(-transform.x / transform.k) + 20} 
                        y={lane.y + 28} 
                        fontSize="14" 
                        fontWeight="900" 
                        fill={lane.color} 
                        opacity="0.5"
                      >
                        {lane.title}
                      </text>
                    </g>
                  ))}

                  {/* Edges (연결선) */}
                  {visibleEdges.map((edge) => {
                    const s = visibleNodes.find(n => n.id === edge.source);
                    const t = visibleNodes.find(n => n.id === edge.target);
                    if (!s || !t) return null;
                    
                    const isSelected = selectedId === edge.id && selectionType === 'edge';
                    const isHoverRelated = hoveredNode ? isEdgeConnectedToHover(edge) : false;
                    const isThisEdgeHovered = hoveredEdge === edge.id;
                    const isActive = isSelected || isThisEdgeHovered || isHoverRelated;
                    
                    const hasRule = edge.method !== 'manual' || (edge.logic && edge.logic.trim() !== '');
                    const edgeColor = hasRule ? '#10b981' : '#ef4444'; 
                    const strokeColor = isSelected ? '#3b82f6' : edgeColor;
                    const marker = isSelected ? 'arrow-blue-selected' : (hasRule ? 'arrow-green' : 'arrow-red');

                    let pathD, midX, midY;
                    const isSameLane = Math.abs(s.y - t.y) < 10;

                    if (isSameLane) {
                        const arcH = 60;
                        pathD = `M ${s.x} ${s.y} Q ${(s.x + t.x)/2} ${s.y - arcH}, ${t.x} ${t.y}`;
                        midX = (s.x + t.x) / 2;
                        midY = s.y - (arcH / 2);
                    } else {
                        midX = (s.x + t.x) / 2;
                        midY = (s.y + t.y) / 2;
                        pathD = `M ${s.x} ${s.y} C ${s.x} ${midY}, ${t.x} ${midY}, ${t.x} ${t.y}`;
                    }

                    let edgeOpacityClass = "opacity-30"; 
                    if (isActive) edgeOpacityClass = "opacity-100";
                    else if (hoveredNode || hoveredEdge) edgeOpacityClass = "opacity-10";

                    let strokeW = isActive ? "3" : "1.5";
                    if (isSelected) strokeW = "4";

                    // 방향성에 따른 화살표 표시 로직
                    const dir = edge.direction || 'forward';
                    const showEndMarker = (dir === 'forward' || dir === 'both') ? `url(#${marker})` : 'none';
                    const showStartMarker = (dir === 'backward' || dir === 'both') ? `url(#${marker})` : 'none';

                    const displayText = edge.method === 'manual' ? (edge.label || '관계 입력') : methodNames[edge.method];

                    return (
                      <g 
                        key={edge.id} 
                        onClick={(e) => handleEdgeClick(e, edge.id)} 
                        onMouseEnter={() => setHoveredEdge(edge.id)}
                        onMouseLeave={() => setHoveredEdge(null)}
                        className={`cursor-pointer group transition-all duration-300 ${edgeOpacityClass}`}
                      >
                        <path d={pathD} stroke="transparent" strokeWidth="20" fill="none" />
                        
                        <path 
                          d={pathD} 
                          stroke={strokeColor} 
                          strokeWidth={strokeW} 
                          fill="none"
                          markerEnd={showEndMarker}
                          markerStart={showStartMarker}
                          className="transition-all duration-300"
                        />
                        
                        <g className={`transition-opacity duration-300 ${isActive ? "opacity-100" : "opacity-0"}`}>
                          <rect x={midX - 50} y={midY - 12} width="100" height="24" rx="12" fill="white" stroke={strokeColor} strokeWidth={isSelected ? "2" : "1.5"} filter="url(#soft-shadow)" />
                          <text x={midX} y={midY + 4} textAnchor="middle" fontSize="10" fill={isSelected ? '#1d4ed8' : '#334155'} fontWeight="bold" pointerEvents="none">
                            {displayText}
                          </text>
                        </g>
                      </g>
                    );
                  })}

                  {/* Nodes */}
                  {visibleNodes.map(node => {
                    const isSelected = selectedId === node.id && selectionType === 'node';
                    const isSource = connectSource === node.id;
                    const isHoverRelated = isNodeConnectedToHover(node.id);
                    
                    let symbol;
                    const strokeStyle = {
                      stroke: isSelected ? '#1e293b' : (isSource ? '#ef4444' : 'rgba(255,255,255,0.3)'),
                      strokeWidth: isSelected || isSource ? "3" : "1"
                    };

                    if (node.type === 'Task') {
                      symbol = <rect x="-20" y="-20" width="40" height="40" rx="10" fill={node.color} {...strokeStyle} filter="url(#soft-shadow)" className="transition-all" />;
                    } else if (['Law', 'Regulation', 'Guideline', 'Deliverable'].includes(node.type)) {
                      symbol = (
                        <g filter="url(#soft-shadow)" className="transition-all">
                          <path d="M-18,-20 L6,-20 L18,-8 L18,20 L-18,20 Z" fill={node.color} {...strokeStyle} />
                          <path d="M6,-20 L6,-8 L18,-8" fill="rgba(255,255,255,0.2)" />
                        </g>
                      );
                    } else if (node.type === 'System') {
                      symbol = <rect x="-16" y="-16" width="32" height="32" rx="6" transform="rotate(45)" fill={node.color} {...strokeStyle} filter="url(#soft-shadow)" className="transition-all" />;
                    } else { 
                      symbol = <circle r="20" fill={node.color} {...strokeStyle} filter="url(#soft-shadow)" className="transition-all" />;
                    }

                    const status = node.meta?.상태 || '미진행';
                    let badgeColor = '#94a3b8'; 
                    if (status === '진행중') badgeColor = '#f97316'; 
                    else if (status === '완료') badgeColor = '#3b82f6'; 
                    else if (status === '보류') badgeColor = '#ef4444'; 
                    else if (!['미진행','진행중','보류','완료'].includes(status)) badgeColor = '#64748b'; 

                    return (
                      <g 
                        key={node.id} 
                        transform={`translate(${node.x}, ${node.y})`} 
                        onMouseDown={(e) => handleNodeMouseDown(e, node.id)} 
                        onClick={(e) => e.stopPropagation()} 
                        onMouseEnter={() => setHoveredNode(node.id)}
                        onMouseLeave={() => setHoveredNode(null)}
                        className={`cursor-pointer transition-opacity duration-300 ${connectMode ? 'hover:opacity-75' : ''} ${isHoverRelated ? 'opacity-100' : 'opacity-15'}`}
                      >
                        {symbol}
                        
                        <g transform="translate(10, -28)" filter="url(#soft-shadow)">
                          <rect width="32" height="14" rx="7" fill={badgeColor} stroke="white" strokeWidth="1" />
                          <text x="16" y="10" fontSize="8" fill="white" textAnchor="middle" fontWeight="bold">
                             {status.length > 3 ? status.substring(0,3)+'..' : status}
                          </text>
                        </g>

                        <text y="4" textAnchor="middle" fontSize="12" fontWeight="900" fill="rgba(255,255,255,0.95)" pointerEvents="none">
                          {node.type.charAt(0)}
                        </text>

                        <rect x="-50" y="26" width="100" height="20" rx="4" fill="white" stroke={isSelected ? '#1e293b' : '#e2e8f0'} filter="url(#soft-shadow)" />
                        <text y="40" textAnchor="middle" fontSize="10" fontWeight="bold" fill={isSelected ? '#0f172a' : '#475569'} pointerEvents="none">
                          {node.label}
                        </text>
                      </g>
                    )
                  })}
                </g>

              <div className="absolute bottom-6 right-6 bg-white border border-slate-200 shadow-lg rounded-xl flex items-center overflow-hidden z-10">

                     </button>
                     <button onClick={() => { addNode('Guideline'); setIsAddModalOpen(false); }} className="flex items-center p-3 border border-slate-200 rounded-xl hover:border-sky-400 hover:shadow-md transition text-left bg-white group">
                        <div className="bg-sky-50 p-2.5 rounded-lg mr-3 group-hover:bg-sky-100 transition"><BookOpen size={16} className="text-sky-600"/></div>
                        <div><div className="text-xs font-extrabold text-slate-800">지침 (Guideline)</div><div className="text-[10px] text-slate-500 mt-0.5 font-medium">매뉴얼, 가이드</div></div>
                     </button>
                     <button onClick={() => { addNode('Deliverable'); setIsAddModalOpen(false); }} className="flex items-center p-3 border border-slate-200 rounded-xl hover:border-sky-300 hover:shadow-md transition text-left bg-white group">
                        <div className="bg-sky-50 p-2.5 rounded-lg mr-3 group-hover:bg-sky-100 transition"><ClipboardCheck size={16} className="text-sky-500"/></div>
                        <div><div className="text-xs font-extrabold text-slate-800">산출물 (Deliverable)</div><div className="text-[10px] text-slate-500 mt-0.5 font-medium">보고서, 양식 등</div></div>
                     </button>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const AdminView = ({ users, onAddUser, onUpdateUser, onDeleteUser }) => {
      const [editingUser, setEditingUser] = useState(null);

      const handleSave = (e) => {
        e.preventDefault();
        if (editingUser.isNew) {
          const newUser = { ...editingUser };
          delete newUser.isNew;
          delete newUser.originalId;
          const success = onAddUser(newUser);
          if (success !== false) setEditingUser(null);
        } else {
          const updated = { ...editingUser };
          delete updated.originalId;
          const success = onUpdateUser(updated, editingUser.originalId);
          if (success !== false) setEditingUser(null);
        }
      };

      const handleAddClick = () => {
        setEditingUser({ id: '', pw: '', name: '', dept: '', role: 'Editor', needPwChange: true, isNew: true });
      };

      return (
        <div className="max-w-5xl mx-auto space-y-6 relative">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-xl font-bold text-slate-800">사용자 계정 및 권한 관리</h2>
            <button onClick={handleAddClick} className="bg-blue-600 text-white px-4 py-2.5 rounded-lg font-bold text-sm hover:bg-blue-700 flex items-center shadow-md transition">
              <Plus size={16} className="mr-2" /> 신규 계정 추가
            </button>
          </div>
          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table className="w-full text-left text-sm">
              <thead className="bg-slate-50 text-slate-600 border-b">
                <tr>
                  <th className="px-6 py-4 font-bold">ID (사번)</th>
                  <th className="px-6 py-4 font-bold">이름</th>
                  <th className="px-6 py-4 font-bold">소속 부서</th>
                  <th className="px-6 py-4 font-bold">시스템 권한</th>
                  <th className="px-6 py-4 font-bold">계정 상태</th>
                  <th className="px-6 py-4 font-bold text-right">관리</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {users.map(u => (
                  <tr key={u.id} className="hover:bg-slate-50 transition">
                    <td className="px-6 py-4 font-extrabold text-slate-800">{u.id}</td>
                    <td className="px-6 py-4">
                      <div className="flex items-center font-bold text-slate-700">
                        <div className="w-7 h-7 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold text-xs mr-3 shadow-sm">
                          {u.name.charAt(0)}
                        </div>
                        {u.name}
                      </div>
                    </td>
                    <td className="px-6 py-4 text-slate-500 font-medium">{u.dept}</td>
                    <td className="px-6 py-4">
                      <span className={`px-2.5 py-1 rounded-md text-xs font-bold shadow-sm border ${u.role === 'System Admin' ? 'bg-purple-50 text-purple-700 border-purple-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200'}`}>
                        {u.role}
                      </span>
                    </td>
                    <td className="px-6 py-4">
                      {u.needPwChange ? 
                        <span className="text-amber-500 font-bold text-xs flex items-center"><AlertCircle size={14} className="mr-1"/>비번 변경 대기</span> : 
                        <span className="text-blue-500 font-bold text-xs flex items-center"><CheckCircle size={14} className="mr-1"/>활성</span>
                      }
                    </td>
                    <td className="px-6 py-4 text-right">
                      <button onClick={() => setEditingUser({...u, originalId: u.id})} className="text-blue-600 hover:text-blue-800 font-bold text-xs mr-3 transition">수정</button>
                      <button onClick={() => onDeleteUser(u.id)} className="text-red-500 hover:text-red-700 font-bold text-xs transition disabled:opacity-30" disabled={u.id==='admin'}>삭제</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {editingUser && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50">
              <div className="bg-white p-8 rounded-2xl shadow-2xl w-[400px]">
                <h3 className="text-lg font-extrabold mb-6 text-slate-800 border-b pb-3">{editingUser.isNew ? '신규 계정 추가' : '계정 정보 수정'}</h3>
                <form onSubmit={handleSave} className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-700 mb-1.5">ID (사번/계정명)</label>
                    <input 
                      type="text" value={editingUser.id} 
                      onChange={e => {
                        if (editingUser.isNew) {
                          setEditingUser({...editingUser, id: e.target.value});
                        } else {
                          setEditingUser({...editingUser, id: e.target.value});
                        }
                      }} 
                      className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium disabled:opacity-50 disabled:bg-slate-50" 
                      placeholder="사번 입력" required
                      disabled={editingUser.originalId === 'admin'}
                    />
                    {editingUser.originalId === 'admin' && <p className="text-[10px] text-red-500 mt-1">최고 관리자 ID는 변경할 수 없습니다.</p>}
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-700 mb-1.5">비밀번호 {editingUser.isNew ? '(초기)' : '(변경할 경우에만 입력)'}</label>
                    <input 
                      type="text" value={editingUser.pw} 
                      onChange={e => setEditingUser({...editingUser, pw: e.target.value})} 
                      className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium disabled:opacity-50 disabled:bg-slate-50" 
                      placeholder={editingUser.isNew ? "초기 비밀번호 입력" : "변경 시에만 입력 (미입력시 유지)"} 
                      required={editingUser.isNew}
                      disabled={editingUser.originalId === 'admin'}
                    />
                    {editingUser.originalId === 'admin' && <p className="text-[10px] text-red-500 mt-1">최고 관리자 비밀번호는 변경할 수 없습니다. (마이페이지 이용)</p>}
                  </div>
                  
                  <div>
                    <label className="block text-xs font-bold text-slate-700 mb-1.5">이름</label>
                    <input 
                      type="text" value={editingUser.name} 
                      onChange={e => setEditingUser({...editingUser, name: e.target.value})} 
                      className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium" required
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-700 mb-1.5">소속 부서</label>
                    <input 
                      type="text" value={editingUser.dept} 
                      onChange={e => setEditingUser({...editingUser, dept: e.target.value})} 
                      className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium" required
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-700 mb-1.5">시스템 권한 (Role)</label>
                    <select 
                      value={editingUser.role} 
                      onChange={e => setEditingUser({...editingUser, role: e.target.value})} 
                      className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium"
                    >
                      <option value="System Admin">System Admin (전체 권한)</option>
                      <option value="Editor">Editor (편집자)</option>
                      <option value="Viewer">Viewer (조회 전용)</option>
                    </select>
                  </div>
                  
                  <div className="flex items-center pt-2 bg-slate-50 p-3 rounded-lg border border-slate-200 mt-2">
                    <input 
                      type="checkbox" id="pwReset" 
                      checked={editingUser.needPwChange} 
                      onChange={e => setEditingUser({...editingUser, needPwChange: e.target.checked})} 
                      className="mr-2" 
                      disabled={editingUser.originalId === 'admin'}
                    />
                    <label htmlFor="pwReset" className="text-xs font-bold text-slate-700 cursor-pointer leading-tight">
                      초기 접속 시 비밀번호 변경 강제<br/><span className="text-[10px] text-slate-500 font-medium">(사용자가 처음 로그인 시 새 비밀번호를 설정해야 합니다)</span>
                    </label>
                  </div>

                  <div className="flex justify-end space-x-2 mt-8 pt-4 border-t border-slate-100">
                    <button 
                      type="button" onClick={() => setEditingUser(null)} 
                      className="px-4 py-2 text-sm font-bold text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 transition"
                    >
                      취소
                    </button>
                    <button 
                      type="submit" 
                      className="px-5 py-2 text-sm font-bold text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition shadow-md"
                    >
                      저장
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TaskOntologyApp />);
  </script>
</body>
</html>
